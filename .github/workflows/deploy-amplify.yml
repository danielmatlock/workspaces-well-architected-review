name: Deploy WorkSpaces WAFR Tool

on:
  push:
    branches:
      - dev
    paths:
      - 'src/**'
      - 'lambda/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - production

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2
  AMPLIFY_APP_ID: d1p2543h8l2mfc

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ inputs.environment }}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENV="production"
          else
            ENV="dev"
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          if [[ "$ENV" == "production" ]]; then
            echo "branch=main" >> $GITHUB_OUTPUT
          else
            echo "branch=dev" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::590183747733:role/github-actions-amplify-deploy
          aws-region: eu-west-2

      - name: Package frontend
        run: |
          cd src
          zip -r /tmp/deploy.zip index.html

      - name: Deploy to Amplify (${{ steps.env.outputs.environment }})
        run: |
          BRANCH=${{ steps.env.outputs.branch }}
          echo "Deploying to branch: $BRANCH (${{ steps.env.outputs.environment }})"
          
          # Cancel any stuck/pending deployments
          PENDING_JOB=$(aws amplify list-jobs \
            --app-id $AMPLIFY_APP_ID \
            --branch-name $BRANCH \
            --region $AWS_REGION \
            --query "jobSummaries[?status=='PENDING'].jobId | [0]" \
            --output text 2>/dev/null || echo "None")
          if [[ "$PENDING_JOB" != "None" && "$PENDING_JOB" != "" ]]; then
            echo "Cancelling pending job: $PENDING_JOB"
            aws amplify stop-job --app-id $AMPLIFY_APP_ID --branch-name $BRANCH --job-id $PENDING_JOB --region $AWS_REGION || true
            sleep 5
          fi
          
          DEPLOY=$(aws amplify create-deployment \
            --app-id $AMPLIFY_APP_ID \
            --branch-name $BRANCH \
            --region $AWS_REGION \
            --output json)
          
          UPLOAD_URL=$(echo $DEPLOY | python3 -c "import sys,json; print(json.load(sys.stdin)['zipUploadUrl'])")
          JOB_ID=$(echo $DEPLOY | python3 -c "import sys,json; print(json.load(sys.stdin)['jobId'])")
          
          curl -T /tmp/deploy.zip "$UPLOAD_URL"
          
          aws amplify start-deployment \
            --app-id $AMPLIFY_APP_ID \
            --branch-name $BRANCH \
            --job-id $JOB_ID \
            --region $AWS_REGION
          
          echo "Deployed to: https://$BRANCH.$AMPLIFY_APP_ID.amplifyapp.com"

  deploy-lambda:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'lambda/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ inputs.environment }}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENV="production"
          else
            ENV="dev"
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::590183747733:role/github-actions-amplify-deploy
          aws-region: eu-west-2

      - name: Deploy Lambda (${{ steps.env.outputs.environment }})
        run: |
          ENV=${{ steps.env.outputs.environment }}
          if [[ "$ENV" == "production" ]]; then
            echo "Skipping Lambda deploy for production (manual only)"
            exit 0
          fi
          
          echo "Deploying dev Lambdas..."
          cd lambda
          
          # Deploy wafr-email-report-dev
          zip /tmp/lambda-email.zip wafr-email-report.py
          aws lambda update-function-code \
            --function-name wafr-email-report-dev \
            --zip-file fileb:///tmp/lambda-email.zip \
            --region $AWS_REGION
          echo "✓ Deployed wafr-email-report-dev"
          
          # Deploy wafr-explain-dev
          zip /tmp/lambda-explain.zip wafr-explain.py
          aws lambda update-function-code \
            --function-name wafr-explain-dev \
            --zip-file fileb:///tmp/lambda-explain.zip \
            --region $AWS_REGION
          echo "✓ Deployed wafr-explain-dev"
