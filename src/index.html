  pillars: [{"name": "Operational Excellence", "questions": [{"id": "OPS-WS-01", "q": "How do you manage your WorkSpaces deployment lifecycle through Infrastructure as Code?", "best": "WorkSpaces infrastructure (VPCs, directories, security groups, IP access control groups, and WorkSpace provisioning) is managed through CloudFormation, Terraform, or CDK. Changes follow version-controlled pipelines with peer review. Manual console operations are minimised and reserved for break-glass scenarios."}, {"id": "OPS-WS-02", "q": "How do you manage and version your WorkSpaces images and bundles?", "best": "A documented image management lifecycle exists covering creation, testing, validation, promotion, and retirement. Images are versioned with clear naming conventions. Image validation steps are performed before publishing (BYOL Image Checker for BYOL imports, manual validation checklist for custom images). A golden image pipeline automates base OS patching, application installation, and validation. Image sprawl is controlled\u2014unused images are regularly reviewed and deregistered."}, {"id": "OPS-WS-03", "q": "How do you patch and update your WorkSpaces fleet?", "best": "A patching strategy addresses both the base image (for new deployments) and running WorkSpaces. For AutoStop WorkSpaces (which may be powered off 70\u201380% of the time), mechanisms such as AWS Systems Manager Patch Manager with maintenance windows, or scheduled wake-and-patch routines, ensure compliance. Patch compliance is measured against defined SLAs (e.g., critical patches within 14 days per Cyber Essentials). Patching does not rely solely on WorkSpaces being online during business hours."}, {"id": "OPS-WS-04", "q": "How do you monitor the health and performance of your WorkSpaces environment?", "best": "CloudWatch metrics are actively monitored, including `Unhealthy`, `ConnectionAttempt`, `ConnectionSuccess`, `ConnectionFailure`, `SessionLaunchTime`, `InSessionLatency`, and `SessionDisconnect`. CloudWatch dashboards (ideally using the pre-built CloudFormation templates) provide at-a-glance fleet health. Alarms are configured for key thresholds (e.g., unhealthy WorkSpaces exceeding a percentage, latency spikes). CloudWatch Logs captures WorkSpaces event data for trend analysis."}, {"id": "OPS-WS-05", "q": "How do you handle WorkSpaces provisioning and deprovisioning at scale?", "best": "Provisioning is automated via API/CLI integration with identity lifecycle systems (e.g., Joiner-Mover-Leaver processes). When a user joins, their WorkSpace is automatically provisioned from the appropriate bundle. When they leave, the WorkSpace is terminated following a defined data-retention period. Self-service provisioning portals may be available for approved use cases. Tagging standards are enforced at creation time."}, {"id": "OPS-WS-06", "q": "How do you manage tagging and cost allocation for your WorkSpaces?", "best": "A consistent tagging strategy is applied to all WorkSpaces resources (WorkSpaces, images, bundles, directories). Tags capture business-relevant metadata: cost centre, department, project, environment, and owner. Tags are enforced through Service Control Policies or tag policies. Tags propagate to Systems Manager managed instances for unified operational views."}, {"id": "OPS-WS-07", "q": "How do you manage user self-service capabilities?", "best": "Self-service options are deliberately configured per directory\u2014not left at defaults. Users can restart and rebuild their own WorkSpaces. Volume increase, compute type changes, and running mode switches are either disabled or gated behind an approval workflow (e.g., ITSM integration). The rationale for each enabled/disabled option is documented."}, {"id": "OPS-WS-08", "q": "How do you respond to and resolve WorkSpaces operational incidents?", "best": "Runbooks exist for common failure scenarios: unhealthy WorkSpaces, connection failures, directory connectivity issues, and image corruption. Escalation paths are defined. EventBridge rules capture WorkSpaces state changes and trigger automated remediation (e.g., auto-reboot of unhealthy instances). Mean time to resolution (MTTR) is tracked for WorkSpaces-related incidents."}, {"id": "OPS-WS-09", "q": "How do you manage application delivery to your WorkSpaces?", "best": "Applications are delivered through a managed mechanism\u2014SCCM, Intune, Ansible, Chef, or Puppet. Application versions are tracked and consistent across the fleet. A decision framework exists for determining which applications are baked into the image versus deployed post-provisioning. Layer-based approaches (thin/hybrid images) are considered for environments with diverse application requirements."}, {"id": "OPS-WS-10", "q": "How do you track and report on WorkSpaces utilisation?", "best": "Utilisation data is collected, aggregated, and reviewed regularly (at minimum monthly). Reports identify unused or underutilised WorkSpaces, enabling right-sizing or termination decisions. Tools such as the WorkSpaces Cost Optimizer, Amazon QuickSight dashboards, or custom CloudWatch-based reporting are in use. Utilisation trends inform capacity planning and licensing decisions."}, {"id": "OPS-WS-11", "q": "How do you manage the migration from PCoIP to Amazon DCV protocol?", "best": "A documented migration plan exists for transitioning WorkSpaces from PCoIP (legacy) to Amazon DCV. The \"Modify protocols\" feature is used to convert WorkSpaces without requiring a rebuild. Migration is phased by user group with pilot testing before broad rollout. User communication covers any client-side changes required. Rollback procedures are defined. Performance baselines are captured pre- and post-migration. Group Policy ADMX templates are updated from PCoIP to DCV settings. The migration timeline aligns with PCoIP deprecation guidance from AWS."}]}, {"name": "Security", "questions": [{"id": "SEC-WS-01", "q": "How do you manage identity and directory integration for your WorkSpaces?", "best": "A deliberate directory strategy is in place\u2014AD Connector for proxied authentication, AWS Managed Microsoft AD for cloud-native, or a trust relationship for hybrid scenarios. The chosen architecture meets requirements for user authentication, Group Policy application, and resource access. Directory health is monitored. Directory service accounts use least-privilege principles. The directory design supports the required scale (users, WorkSpaces, and Group Policy objects)."}, {"id": "SEC-WS-02", "q": "How do you enforce multi-factor authentication (MFA) for WorkSpaces access?", "best": "MFA is mandatory for all WorkSpaces connections. A RADIUS-compatible MFA solution is integrated (e.g., Azure MFA with NPS extension, Duo, RSA SecurID, or AWS-native solutions). MFA is configured at the directory level and applies universally. Fallback procedures exist for MFA service disruptions. Certificate-Based Authentication (CBA) is evaluated for passwordless workflows where DCV protocol is in use. WebAuthN-based authentication is considered for FIDO2 security key support."}, {"id": "SEC-WS-03", "q": "How do you control which devices can connect to your WorkSpaces?", "best": "IP Access Control Groups restrict connections to known network ranges (corporate offices, VPN exit points). Trusted device policies enforce client certificate validation where required. Device type restrictions limit access to approved client platforms. Access policies are reviewed when network architecture changes (e.g., new office locations, VPN provider changes)."}, {"id": "SEC-WS-04", "q": "How do you protect data at rest within your WorkSpaces?", "best": "WorkSpaces volume encryption is enabled using AWS KMS customer-managed keys (CMKs). Encryption covers both root and user volumes. KMS key policies follow least privilege. Key rotation is configured. The implications of encryption on WorkSpace rebuild and migration operations are understood and documented."}, {"id": "SEC-WS-05", "q": "How do you protect data in transit for your WorkSpaces?", "best": "The streaming protocol (Amazon DCV (formerly WSP) or PCoIP (legacy)) encrypts all pixel data in transit using AES-256. Where additional network-level controls are required, PrivateLink/VPC Interface Endpoints are configured to keep streaming traffic entirely within the AWS network\u2014eliminating internet traversal. TLS 1.2+ is enforced for all management plane operations."}, {"id": "SEC-WS-06", "q": "How do you prevent data exfiltration from your WorkSpaces?", "best": "Group Policy and WorkSpaces properties are configured to control: clipboard redirection (copy/paste), local drive mapping, printing, USB redirection, and audio input. Settings are tailored by user group based on data sensitivity. For high-security environments, all local device redirection is disabled, and WorkSpaces operate as secure enclaves. AWS Verified Access is considered for zero-trust architectures."}, {"id": "SEC-WS-07", "q": "How do you manage network security for your WorkSpaces VPC?", "best": "WorkSpaces reside in dedicated private subnets with no direct internet access. Internet egress routes through a NAT Gateway or centralised inspection (AWS Network Firewall, third-party NGFW). Security groups on WorkSpaces ENIs follow least privilege\u2014only required ports are open. Network ACLs provide an additional layer of defence. Separate security groups exist for management traffic versus user data traffic. DNS resolution is controlled (e.g., Route 53 Resolver with forwarding rules)."}, {"id": "SEC-WS-08", "q": "How do you manage endpoint protection on your WorkSpaces?", "best": "Anti-malware/EDR agents are deployed to all WorkSpaces (baked into the image or deployed via management tooling). Agents are kept current and report to a centralised console. Exclusions are configured for WorkSpaces-specific processes to avoid performance degradation (e.g., PCoIP/DCV agent processes). Windows Defender or third-party solutions are actively managed\u2014not relying on default configurations."}, {"id": "SEC-WS-09", "q": "How do you audit and log WorkSpaces activity?", "best": "CloudTrail captures all WorkSpaces API calls (management plane). CloudWatch Events/EventBridge captures WorkSpaces access events (login, disconnect, reconnect). Windows Event Logs are forwarded to a centralised SIEM (via CloudWatch Agent or third-party forwarder). Login success/failure patterns are monitored for anomalies. Logs are retained per compliance requirements and protected from tampering."}, {"id": "SEC-WS-10", "q": "How do you manage Group Policy for your WorkSpaces fleet?", "best": "Group Policy Objects (GPOs) are used to enforce security baselines across the WorkSpaces fleet. GPOs are version-controlled and tested in a staging OU before production deployment. WorkSpaces-specific ADMX templates (for PCoIP and Amazon DCV settings) are deployed. GPO conflicts are identified and resolved. A documented baseline exists covering: screen lock timeout, password policy, removable storage, software restriction policies, and browser configuration."}, {"id": "SEC-WS-11", "q": "How do you handle Windows operating system end-of-support for your WorkSpaces?", "best": "A migration plan exists for end-of-support operating systems (e.g., Windows 10 EOS October 2025, Amazon Linux 2 EOL June 30, 2026). BYOL images are migrated to supported OS versions. Timelines, testing, and user communication plans are documented. Extended Security Updates (ESU) are considered only as a short-term bridge while migration completes\u2014not as a long-term strategy. The GraphicsPro bundle EOL (October 2025) is addressed with migration to Graphics G6/Gr6/G6f bundles. Amazon Linux 2 WorkSpaces require urgent migration to Ubuntu or other supported OS before the June 30, 2026 deadline."}, {"id": "SEC-WS-12", "q": "How do you manage Microsoft Entra ID integration for your WorkSpaces?", "best": "Where the organisation uses Microsoft Entra ID (formerly Azure AD) as their primary identity provider, the integration approach is deliberate. For BYOL WorkSpaces (Windows 10/11), Entra ID join via Custom directories is evaluated. The prerequisites are understood: BYOL licensing, supported OS versions, and network connectivity to Entra ID endpoints. Conditional Access policies are configured to enforce device compliance and MFA for WorkSpaces sessions. The distinction between Entra ID join (cloud-native) and hybrid Entra ID join (on-premises AD synced) is understood and the appropriate model selected."}, {"id": "SEC-WS-13", "q": "How do you manage security for WorkSpaces Web Access?", "best": "Web Access is deliberately enabled or disabled per directory based on the security posture required. Where enabled, DCV Web Access is used (PCoIP Web Access is deprecated for new customers since November 2025). Browser-based access introduces unique risks \u2014 session token management, browser extension interference, and data residency in browser cache are addressed. IP Access Control Groups apply equally to web and native client connections. Users are guided to supported browser versions. Web Access is disabled for high-security user populations where native client with certificate-based device trust is required."}]}, {"name": "Reliability", "questions": [{"id": "REL-WS-01", "q": "How do you design your VPC and subnets for WorkSpaces resilience?", "best": "WorkSpaces are deployed across a minimum of two Availability Zones via directory subnet configuration. Subnet sizing accounts for current fleet and growth projections (each WorkSpace consumes one IP address). CIDR ranges are planned to avoid conflicts with on-premises networks and other VPCs. IP address exhaustion is monitored and alerted upon. A dedicated VPC or dedicated subnets within a shared VPC provide appropriate isolation."}, {"id": "REL-WS-02", "q": "How do you ensure directory service high availability?", "best": "AWS Managed Microsoft AD is deployed with domain controllers in at least two AZs. For AD Connector scenarios, the connector targets multiple on-premises domain controllers. Directory health metrics are monitored (replication status, LDAP response times). DNS resolution for directory services is redundant. If on-premises connectivity fails, the impact on WorkSpaces authentication is understood and documented (e.g., cached credentials behaviour)."}, {"id": "REL-WS-03", "q": "How do you handle WorkSpaces failure and recovery?", "best": "Automated snapshots are understood (every 12 hours for user volumes). Rebuild procedures are documented and tested\u2014staff know the difference between reboot, rebuild, and restore. Users understand that rebuild reverts to the last snapshot. For critical users, more frequent backup mechanisms are considered (e.g., FSLogix profile containers on FSx, OneDrive/SharePoint sync). WorkSpace health checks trigger automated remediation via EventBridge and Lambda."}, {"id": "REL-WS-04", "q": "How do you plan for business continuity and disaster recovery?", "best": "Multi-Region Resilience (MRR) is evaluated and implemented for business-critical user populations. Standby WorkSpaces in a secondary Region provide an RTO of less than 30 minutes. Cross-Region DNS failover is configured. For less critical populations, documented manual procedures exist for re-provisioning in an alternate Region. Recovery procedures are tested at least annually. RTO and RPO targets are defined and achievable."}, {"id": "REL-WS-05", "q": "How do you ensure reliable network connectivity between users and WorkSpaces?", "best": "Network path redundancy exists for all connectivity scenarios: user-to-WorkSpace (internet/VPN), WorkSpace-to-backend (VPC routing, Direct Connect, Transit Gateway). PrivateLink/VPC Interface Endpoints are evaluated for private streaming connectivity where applicable. Network latency is monitored\u2014PCoIP requires < 100ms RTT, Amazon DCV tolerates higher latency but degrades beyond 250ms. Failover paths are tested for Direct Connect and VPN scenarios."}, {"id": "REL-WS-06", "q": "How do you manage WorkSpaces capacity and scaling?", "best": "Capacity planning accounts for peak concurrent users plus a buffer. For WorkSpaces Personal, provisioning automation ensures new WorkSpaces are available within SLA when users are onboarded. For WorkSpaces Pools, scaling policies and warm pools are configured to handle demand spikes. Subnet capacity and service quotas are monitored and increases requested proactively. Account-level WorkSpaces limits are understood and sufficient."}, {"id": "REL-WS-07", "q": "How do you handle dependency failures (internet, DNS, backend applications)?", "best": "The impact of upstream dependency failures on WorkSpaces usability is mapped and documented. Internet gateway or NAT Gateway failures are mitigated through multi-AZ NAT deployment. DNS failures are mitigated through Route 53 Resolver with appropriate forwarding. Backend application unavailability is communicated to users. WorkSpaces can still function (login, basic operation) even if individual backend services are degraded."}, {"id": "REL-WS-08", "q": "How do you ensure Amazon Linux 2 WorkSpaces are migrated before end-of-life (June 30, 2026)?", "best": "All Amazon Linux 2 WorkSpaces are identified and an urgent migration plan is in place. The deadline of June 30, 2026 is understood \u2014 after this date, Amazon Linux 2 will no longer receive security patches or updates. Migration targets are defined (Ubuntu WorkSpaces or Windows alternatives). User data preservation is planned (user volume snapshots, profile migration). Application compatibility on the target OS is validated. A phased migration timeline with user communication exists. Post-migration validation confirms all users are functional on the new OS."}]}, {"name": "Performance Efficiency", "questions": [{"id": "PERF-WS-01", "q": "How do you select the appropriate streaming protocol for your WorkSpaces?", "best": "The protocol choice (Amazon DCV vs. PCoIP) is a deliberate decision based on requirements: Amazon DCV (formerly WSP) offers superior features (bidirectional audio/video, certificate-based auth, smart card, SDK extensions, 4K resolution on non-GPU instances) and is the strategic direction. PCoIP is the legacy protocol, retained only where specific compatibility is required. A migration plan from PCoIP to Amazon DCV exists with rollback procedures \u2014 the \"Modify protocols\" feature enables conversion without rebuild. Protocol performance metrics (latency, frame rate, bandwidth) are monitored per user."}, {"id": "PERF-WS-02", "q": "How do you select the appropriate bundle types for your user populations?", "best": "User personas are defined (e.g., task worker, knowledge worker, power user, developer, graphics professional) with corresponding bundle specifications. Bundle selection is validated through user acceptance testing\u2014not guesswork. Over-provisioned bundles are identified through utilisation monitoring (CPU, memory via CloudWatch). Right-sizing reviews occur at least quarterly. GPU bundles (Graphics.g4dn, Graphics G6, Gr6, G6f on NVIDIA L4 with fractional GPU options) are reserved for validated graphics workloads. Note: GraphicsPro bundle reached EOL October 2025 \u2014 migrate to G6/Gr6/G6f bundles."}, {"id": "PERF-WS-03", "q": "How do you optimise network performance for your WorkSpaces users?", "best": "WorkSpaces are deployed in the AWS Region closest to the majority of users. For globally distributed users, multi-Region deployment with connection aliases enables users to connect to their nearest Region. Network path quality is measured (RTT, jitter, packet loss). Quality of Service (QoS) policies prioritise WorkSpaces streaming traffic on corporate networks. Users connecting from home/remote are guided on minimum bandwidth requirements (typically 2\u20134 Mbps per session)."}, {"id": "PERF-WS-04", "q": "How do you optimise storage performance for your WorkSpaces?", "best": "Root volume and user volume sizes are right-sized per persona\u2014oversized volumes waste cost while undersized volumes cause user friction. SSD-backed volumes (gp3 equivalent) are standard. For I/O-intensive workloads, volume performance characteristics are validated. User data that does not require local storage is directed to network shares (FSx, EFS) or cloud storage (S3, OneDrive). Volume increase requests are tracked to identify patterns requiring baseline adjustments."}, {"id": "PERF-WS-05", "q": "How do you manage WorkSpaces performance for real-time communication workloads?", "best": "If users run Microsoft Teams, Zoom, or similar UC applications within WorkSpaces, media optimisation is configured. For Teams, the WorkSpaces client-side media optimisation offloads audio/video processing to the client device. For Amazon Connect, the Connect Optimization for WorkSpaces feature is evaluated. Without optimisation, real-time audio/video traverses the pixel stream, degrading quality and consuming excessive bandwidth. Performance metrics specific to UC workloads are monitored."}, {"id": "PERF-WS-06", "q": "How do you manage WorkSpaces client experience across diverse endpoint devices?", "best": "Supported client versions are documented and communicated to users. Client auto-update policies are in place. The experience is validated across all supported client platforms (Windows, macOS, Linux, iPad, Android, Web Access, Thin Client). Display configuration best practices are communicated (resolution, multi-monitor support varies by protocol and client). Note: PCoIP Web Access is deprecated for new customers (November 2025) \u2014 DCV Web Access is the supported path forward. WorkSpaces Thin Client reaches end of support on March 31, 2027 \u2014 new device investments should consider third-party thin client alternatives (IGEL, 10ZiG, Dell Wyse)."}, {"id": "PERF-WS-07", "q": "How do you address latency and performance for users connecting from varying locations?", "best": "A Connection Health Check URL or similar diagnostic is available for users to validate connectivity before raising support tickets. CloudWatch `InSessionLatency` metrics are trended per user/location. Users experiencing degraded performance are guided through network diagnostics. For users consistently above latency thresholds, alternative approaches are considered (Region re-deployment, VPN optimisation, SD-WAN). Protocol-specific tuning (Amazon DCV adaptive settings, PCoIP bandwidth limits) is applied where needed."}, {"id": "PERF-WS-08", "q": "How do you leverage WorkSpaces for AI agent workloads?", "best": "Where the organisation is exploring AI-powered automation of legacy desktop applications, WorkSpaces as agent compute is evaluated (May 2026 preview). The use case is clearly defined \u2014 AI agents operating legacy applications that lack APIs benefit from a virtual desktop environment. Performance requirements for agent workloads are understood (compute-intensive, potentially GPU-accelerated). Security boundaries between agent WorkSpaces and production environments are enforced. Agent session monitoring and audit logging capture all automated actions. Cost modelling accounts for the potentially 24/7 running nature of agent WorkSpaces (AlwaysOn mode)."}]}, {"name": "Cost Optimisation", "questions": [{"id": "COST-WS-01", "q": "How do you optimise WorkSpaces running mode selection?", "best": "The Cost Optimizer for Amazon WorkSpaces solution is deployed and actively converting WorkSpaces between AlwaysOn and AutoStop based on the ~80-hour monthly breakeven point. Running mode decisions are data-driven, not assumed. For GPU bundles, the different breakeven calculations are understood. Exceptions (e.g., WorkSpaces that must remain AlwaysOn for operational reasons) are tagged with `Skip_Convert` and documented."}, {"id": "COST-WS-02", "q": "How do you identify and terminate unused WorkSpaces?", "best": "A process exists to identify WorkSpaces with zero or minimal usage over a defined period (e.g., 30\u201360 days). The Cost Optimizer's termination feature is evaluated (dry-run first, then active). Joiner-Mover-Leaver processes trigger WorkSpace termination on user departure. Orphaned WorkSpaces (user account disabled/deleted) are identified and cleaned up. Monthly reports surface candidates for termination with appropriate data backup confirmation."}, {"id": "COST-WS-03", "q": "How do you manage WorkSpaces licensing costs?", "best": "A clear decision exists between AWS-included licensing and BYOL. For BYOL: the minimum 100 WorkSpaces per Region commitment on dedicated hardware is met, Microsoft licensing agreements permit VDI use (VDA E3/E5 subscription), and the cost differential is regularly validated. Microsoft 365 licensing (Apps for Enterprise) is addressed\u2014either included in the user's existing M365 subscription or separately licensed. Windows Server CALs are understood for WorkSpaces Core scenarios."}, {"id": "COST-WS-04", "q": "How do you right-size WorkSpaces compute and storage?", "best": "Bundle specifications are reviewed against actual utilisation data at least quarterly. Over-provisioned WorkSpaces (consistently low CPU/memory utilisation) are migrated to smaller bundles. Volume sizes are started at the minimum appropriate level, with self-service or approved increase workflows. Storage increase is a one-way operation (cannot reduce later)\u2014this is communicated and controlled. WorkSpaces Pools are evaluated for non-persistent use cases (task workers, training, contact centres) to reduce per-user costs."}, {"id": "COST-WS-05", "q": "How do you manage data transfer and networking costs for WorkSpaces?", "best": "Data transfer costs are understood and monitored\u2014particularly egress from WorkSpaces to the internet and cross-AZ/cross-Region traffic. NAT Gateway data processing charges are tracked. VPC Endpoints are used for AWS service traffic (S3, DynamoDB) to reduce NAT costs. Internet breakout architecture is optimised (centralised vs. per-VPC). For large-scale deployments, the cost of PrivateLink endpoints is weighed against internet-based streaming costs."}, {"id": "COST-WS-06", "q": "How do you evaluate WorkSpaces Personal versus WorkSpaces Pools for your use cases?", "best": "A framework exists for determining which user populations suit Personal (persistent, stateful) versus Pools (non-persistent, shared). Task workers, seasonal staff, training environments, and contact centre agents are candidates for Pools. Profile persistence for Pools users is addressed through application-level sync (OneDrive, FSLogix with FSx). Cost modelling compares per-user costs across both models including profile storage overhead."}, {"id": "COST-WS-07", "q": "How do you forecast and budget for WorkSpaces costs?", "best": "Monthly WorkSpaces spend is predictable and within budget. Cost anomaly detection (AWS Cost Anomaly Detection) is configured for the WorkSpaces service. Forecasting accounts for: user growth, seasonal patterns (e.g., contractors), running mode mix, and planned bundle changes. Chargeback/showback mechanisms allocate costs to consuming business units using tags. Reserved pricing or commitment discounts are evaluated where applicable."}]}, {"name": "Sustainability", "questions": [{"id": "SUS-WS-01", "q": "How do you align WorkSpaces resource provisioning with actual demand?", "best": "AutoStop mode is the default for WorkSpaces where the use case permits\u2014stopped WorkSpaces consume minimal resources. The AutoStop timeout is set appropriately (not too long, causing unnecessary running time; not too short, causing user frustration). Unused WorkSpaces are terminated rather than left in a stopped state indefinitely. WorkSpaces Pools with appropriate scaling policies avoid over-provisioning compared to idle Personal WorkSpaces."}, {"id": "SUS-WS-02", "q": "How do you select an appropriate Region for sustainability?", "best": "Where multiple Regions meet latency requirements, preference is given to Regions powered by renewable energy. AWS publishes sustainability information per Region that informs this decision. User proximity is balanced against carbon intensity. For DR/secondary Regions, the sustainability characteristics are considered alongside cost and performance."}, {"id": "SUS-WS-03", "q": "How do you minimise the environmental impact of end-user devices?", "best": "Low-power thin client devices are evaluated as an alternative to full desktop PCs, consuming approximately 4W compared to 50\u2013150W for traditional desktops. Note: AWS WorkSpaces Thin Client reaches end of support on March 31, 2027 \u2014 for new deployments, consider third-party thin client devices (IGEL, 10ZiG, Dell Wyse, HP t-series) which offer equivalent power savings. BYOD policies extending the life of existing personal devices are considered. The shift from physical desktops to virtual desktops is quantified in terms of energy savings and hardware refresh reduction. E-waste from decommissioned physical desktops is responsibly recycled."}, {"id": "SUS-WS-04", "q": "How do you right-size WorkSpaces to avoid wasteful over-provisioning?", "best": "Compute bundles match actual workload requirements\u2014provisioning a Power bundle for a user running only web browsers and email wastes cloud resources. Regular right-sizing reviews ensure bundles track changing user needs. Image sizes are optimised (removing unnecessary applications reduces storage footprint and deployment time). Data stored on user volumes is relevant and current\u2014stale data is archived or removed."}, {"id": "SUS-WS-05", "q": "How do you optimise image management for sustainability?", "best": "Golden images are consolidated where possible\u2014minimising the number of unique images reduces storage and management overhead. Thin/hybrid image approaches reduce image size (smaller images = less storage, faster provisioning, less network transfer during deployment). Image lifecycle policies ensure outdated images are deregistered and associated snapshots deleted. Application layering is preferred over proliferating full-fat images for every application combination."}]}]
};

var ORR_TEMPLATE = {
  id: 'orr-default',
  name: 'Operational Readiness Review (ORR)',
  description: 'AWS Operational Readiness Review checklist for TAM-led ORR workshops',
  pillars: [
    {"name": "Service Goals", "questions": [
      {"id": "ORR-SG-01", "q": "Are SLAs established (availability, durability, latency)?", "best": "Service Level Agreements are formally defined with measurable targets for availability (e.g., 99.9%), durability, and latency. SLAs are agreed with business stakeholders and documented. Monitoring is in place to measure compliance against SLA targets."},
      {"id": "ORR-SG-02", "q": "Are compliance and governance requirements defined?", "best": "All relevant compliance frameworks (e.g., PCI-DSS, HIPAA, SOC2, ISO 27001, Cyber Essentials) are identified. Governance requirements are documented including data residency, access controls, and audit requirements. Compliance is validated through automated checks where possible."},
      {"id": "ORR-SG-03", "q": "Are RPO and RTO defined and agreed?", "best": "Recovery Point Objective (maximum acceptable data loss) and Recovery Time Objective (maximum acceptable downtime) are formally defined per service tier. RPO/RTO targets are agreed with business stakeholders and technically validated through testing. Different tiers may have different targets."},
      {"id": "ORR-SG-04", "q": "Is the disaster recovery strategy defined and documented?", "best": "A DR strategy is documented covering: backup approach, recovery procedures, failover mechanisms, and communication plans. The strategy aligns with agreed RPO/RTO targets. DR procedures are tested at least annually. Responsible teams and escalation paths are identified."},
      {"id": "ORR-SG-05", "q": "Is a capacity plan documented for normal and peak load?", "best": "Capacity requirements are documented for normal operations and anticipated peak load scenarios. Auto-scaling policies are defined where applicable. Service quotas and limits are reviewed. Load testing validates the capacity plan. Growth projections inform future capacity needs."}
    ]},
    {"name": "Architecture / Design", "questions": [
      {"id": "ORR-AD-01", "q": "Are architecture diagrams and data flows documented?", "best": "Up-to-date architecture diagrams exist showing all components, their interactions, and data flows. Diagrams are version-controlled and reviewed when changes are made. Both logical and physical views are documented. Data classification and flow directions are clearly marked."},
      {"id": "ORR-AD-02", "q": "Is infrastructure deployed as code (CloudFormation, Terraform, CDK)?", "best": "All infrastructure is defined as code in version-controlled repositories. Manual console changes are prohibited in production. Infrastructure changes follow the same review and deployment processes as application code. Drift detection identifies any out-of-band changes."},
      {"id": "ORR-AD-03", "q": "Is Multi-AZ / high availability configured?", "best": "Critical components are deployed across multiple Availability Zones. Load balancers distribute traffic across AZs. Databases use Multi-AZ deployments or read replicas. The architecture can tolerate the loss of a single AZ without service degradation. Failover is automatic where possible."},
      {"id": "ORR-AD-04", "q": "Are single points of failure identified and mitigated?", "best": "A systematic review has identified all single points of failure in the architecture. Each SPOF has a documented mitigation strategy (redundancy, failover, or accepted risk with justification). Critical path components have redundancy. The impact of each potential failure is understood."},
      {"id": "ORR-AD-05", "q": "Are blast radius reduction measures in place?", "best": "The architecture limits the impact of failures through isolation boundaries (e.g., cell-based architecture, bulkheads, circuit breakers). Deployments use phased rollouts to limit blast radius. Resource isolation prevents noisy-neighbour effects. Failure domains are well-defined and contained."},
      {"id": "ORR-AD-06", "q": "Have service quotas/limits been reviewed with TAM?", "best": "All relevant AWS service quotas are documented. Current usage is compared against limits with appropriate headroom. Quota increase requests are submitted proactively before hitting limits. Monitoring alerts when usage approaches quota thresholds. The TAM has reviewed critical quotas."},
      {"id": "ORR-AD-07", "q": "Are tags defined and applied (cost, ownership, environment)?", "best": "A mandatory tagging strategy is defined covering: cost centre, owner, environment, application, and project. Tags are enforced through AWS Organizations tag policies or SCPs. All resources are tagged at creation time. Tags enable accurate cost allocation, operational management, and access control."},
      {"id": "ORR-AD-08", "q": "Is dependency mapping completed (internal and external)?", "best": "All service dependencies are identified and documented — both internal (other team services, shared infrastructure) and external (third-party APIs, SaaS providers). Dependency health is monitored. Fallback behaviour when dependencies are unavailable is defined and tested. Critical path dependencies are identified."}
    ]},
    {"name": "Security", "questions": [
      {"id": "ORR-SEC-01", "q": "Does IAM follow the least-privilege principle?", "best": "IAM policies grant minimum necessary permissions. Wildcard permissions are avoided. IAM Access Analyzer is used to identify overly permissive policies. Service roles are scoped to specific resources. Regular access reviews remove unnecessary permissions. Temporary credentials are preferred over long-lived keys."},
      {"id": "ORR-SEC-02", "q": "Is MFA enabled for privileged access?", "best": "MFA is enforced for all human access to AWS accounts, especially for privileged operations. Root account has MFA enabled and is not used for daily operations. Break-glass procedures exist for MFA recovery. Hardware MFA tokens are used for the most critical accounts."},
      {"id": "ORR-SEC-03", "q": "Is encryption at rest and in-transit configured?", "best": "All data at rest is encrypted using AWS KMS with customer-managed keys where compliance requires it. All data in transit uses TLS 1.2 or higher. KMS key policies follow least privilege. Key rotation is enabled. Certificate management is automated where possible."},
      {"id": "ORR-SEC-04", "q": "Are security group rules reviewed and stored in source control?", "best": "Security groups follow least-privilege network access. Rules are defined in infrastructure-as-code and version-controlled. Changes require peer review. No security groups allow unrestricted inbound access (0.0.0.0/0) except for public-facing load balancers on specific ports. Regular reviews remove stale rules."},
      {"id": "ORR-SEC-05", "q": "Are secrets managed via Secrets Manager / Parameter Store?", "best": "No secrets are hardcoded in application code, configuration files, or environment variables. AWS Secrets Manager or Systems Manager Parameter Store manages all secrets with automatic rotation where supported. Applications retrieve secrets at runtime. Secret access is audited via CloudTrail."},
      {"id": "ORR-SEC-06", "q": "Is a security incident response plan documented and tested?", "best": "A security incident response plan defines roles, responsibilities, communication procedures, and technical steps for common incident types. The plan is tested through tabletop exercises or simulations at least annually. Integration with AWS security services (GuardDuty, Security Hub) enables automated detection and initial response."},
      {"id": "ORR-SEC-07", "q": "Is GuardDuty / Security Hub enabled?", "best": "Amazon GuardDuty is enabled across all accounts and Regions for threat detection. AWS Security Hub aggregates findings from GuardDuty, Inspector, and other services. Findings are triaged and actioned within defined SLAs. Critical and high findings trigger automated notifications to security teams."},
      {"id": "ORR-SEC-08", "q": "Is vulnerability scanning integrated into the pipeline?", "best": "Automated vulnerability scanning runs as part of the CI/CD pipeline. Container images are scanned (ECR image scanning, Snyk, Trivy). Dependencies are checked for known vulnerabilities (npm audit, OWASP). Infrastructure code is scanned (cfn-lint, tfsec, checkov). Findings block deployment above a defined severity threshold."}
    ]},
    {"name": "Testing", "questions": [
      {"id": "ORR-TST-01", "q": "Are test plans integrated into the CI/CD pipeline?", "best": "Unit tests, integration tests, and end-to-end tests run automatically on every code change. Test coverage is measured and maintains a minimum threshold. Tests must pass before code can be merged or deployed. Test environments mirror production configuration as closely as possible."},
      {"id": "ORR-TST-02", "q": "Have failover / DR tests been performed end-to-end?", "best": "Disaster recovery procedures are tested end-to-end at least annually (more frequently for critical services). Tests validate that RPO/RTO targets are achievable. Test results are documented with identified improvements. Both planned and unplanned failover scenarios are covered."},
      {"id": "ORR-TST-03", "q": "Has load testing been performed against peak traffic expectations?", "best": "Load tests simulate expected peak traffic plus a safety margin (e.g., 2x expected peak). Tests identify bottlenecks, breaking points, and auto-scaling behaviour. Results are documented and compared against capacity plans. Load tests are repeated after significant architecture changes."},
      {"id": "ORR-TST-04", "q": "Are game day / chaos engineering exercises planned?", "best": "Regular game days or chaos engineering exercises (using AWS Fault Injection Simulator or similar) test system resilience. Scenarios include: dependency failure, AZ failure, network partition, and resource exhaustion. Results feed back into architecture improvements. Teams are trained on incident response through these exercises."},
      {"id": "ORR-TST-05", "q": "Are rollback procedures tested and validated?", "best": "Rollback procedures are documented for every deployment type (application, infrastructure, database schema). Rollbacks are tested in non-production environments before relying on them. Automated rollback triggers are configured where possible (e.g., CloudWatch alarm triggers CodeDeploy rollback). Time-to-rollback is measured and acceptable."}
    ]},
    {"name": "Monitoring & Observability", "questions": [
      {"id": "ORR-MON-01", "q": "Are application and infrastructure dashboards created?", "best": "Dashboards exist for both application-level metrics (request rates, error rates, latency percentiles) and infrastructure metrics (CPU, memory, disk, network). Dashboards are accessible to on-call engineers and stakeholders. Key business metrics are visible alongside technical metrics. Dashboards load quickly and show real-time data."},
      {"id": "ORR-MON-02", "q": "Are alerts configured with defined on-call contacts and escalation paths?", "best": "Alerts are configured for all critical failure scenarios with clear severity levels. Each alert has a defined responder (on-call rotation) and escalation path if not acknowledged within a defined period. Alert fatigue is managed — alerts are actionable, not informational. PagerDuty/OpsGenie or similar manages on-call routing."},
      {"id": "ORR-MON-03", "q": "Is centralised logging configured (CloudWatch Logs, OpenSearch)?", "best": "All application and infrastructure logs are aggregated in a centralised logging platform. Log retention meets compliance requirements. Logs are searchable and correlated across services. Structured logging (JSON) is used for machine-parseability. Log levels are appropriate (not overly verbose in production)."},
      {"id": "ORR-MON-04", "q": "Is distributed tracing enabled (X-Ray or equivalent)?", "best": "Distributed tracing is enabled across all services in the request path. Trace IDs propagate through service boundaries. Traces enable identification of latency bottlenecks and error sources. Sampling rates are configured appropriately. Traces are correlated with logs and metrics."},
      {"id": "ORR-MON-05", "q": "Are business KPI metrics tracked alongside infrastructure metrics?", "best": "Business-relevant metrics (e.g., orders per minute, sign-ups, revenue) are tracked in the monitoring platform alongside infrastructure metrics. Correlation between technical issues and business impact is visible. Business metric anomalies trigger alerts."},
      {"id": "ORR-MON-06", "q": "Are runbooks/playbooks linked to alarms?", "best": "Every alert has a linked runbook describing: what the alert means, how to investigate, common root causes, and remediation steps. Runbooks are maintained alongside the service code. Runbook links are included in alert notifications. Runbooks are reviewed and updated after incidents."},
      {"id": "ORR-MON-07", "q": "Is canary/synthetic monitoring in place for key user journeys?", "best": "Synthetic monitors (CloudWatch Synthetics canaries) continuously test critical user journeys from external vantage points. Canaries detect issues before users report them. Canary failures trigger alerts. Canary scripts are maintained as code and updated when user journeys change."}
    ]},
    {"name": "Operations", "questions": [
      {"id": "ORR-OPS-01", "q": "Is an incident management process defined (severity, response, escalation)?", "best": "A formal incident management process defines: severity levels with clear criteria, response time SLAs per severity, escalation paths, communication procedures (internal and external), and post-incident review requirements. The process is documented, trained, and practiced."},
      {"id": "ORR-OPS-02", "q": "Is a change management process documented?", "best": "All production changes follow a defined change management process. Changes are categorised (standard, normal, emergency). Approval workflows are proportional to risk. Change records capture: what changed, why, who approved, and how to rollback. Emergency change procedures exist for urgent fixes."},
      {"id": "ORR-OPS-03", "q": "Is a post-incident review (PIR) process established?", "best": "A blameless post-incident review process exists for all significant incidents. PIRs identify root causes, contributing factors, and action items. Action items are tracked to completion. Learnings are shared across teams. PIR templates and facilitation guides are available."},
      {"id": "ORR-OPS-04", "q": "Are backup and restore procedures tested?", "best": "Backup procedures are automated and monitored for completion. Restore procedures are documented and tested regularly (at least quarterly). Restore tests validate data integrity and measure time-to-restore against RTO targets. Backup retention aligns with compliance and business requirements."},
      {"id": "ORR-OPS-05", "q": "Is a patching cadence defined and automated?", "best": "A patching schedule is defined with SLAs per severity (e.g., critical patches within 7 days). Patching is automated through AWS Systems Manager Patch Manager or equivalent. Patch compliance is measured and reported. Patching follows the deployment pipeline (test before production). Exception processes exist for patches that cannot be applied immediately."},
      {"id": "ORR-OPS-06", "q": "Is an on-call rotation established with escalation paths?", "best": "A formal on-call rotation ensures 24/7 coverage for critical services. On-call engineers have the access, tools, and knowledge to respond. Escalation paths are defined for when issues exceed the on-call engineer's capability. On-call handoff procedures transfer context between shifts. On-call load is distributed fairly across the team."},
      {"id": "ORR-OPS-07", "q": "Has IEM (Infrastructure Event Management) been evaluated with TAM for go-live?", "best": "For significant launches or events, AWS Infrastructure Event Management has been discussed with the TAM. IEM provides AWS support during critical business events. Preparation includes: architecture review, scaling guidance, operational readiness assessment, and real-time AWS support during the event window."}
    ]},
    {"name": "Deployment", "questions": [
      {"id": "ORR-DEP-01", "q": "Is a CI/CD pipeline in place for application and infrastructure?", "best": "Fully automated CI/CD pipelines deploy both application code and infrastructure changes. Pipelines include: build, test, security scan, staging deployment, validation, and production deployment. Manual steps are minimised. Pipeline failures block deployment and notify the team."},
      {"id": "ORR-DEP-02", "q": "Is a safe deployment strategy adopted (blue/green, canary, rolling)?", "best": "Production deployments use a progressive delivery strategy that limits blast radius. Blue/green deployments enable instant rollback. Canary deployments validate with a small percentage of traffic before full rollout. Rolling deployments update instances gradually. The chosen strategy matches the service's requirements for availability and rollback speed."},
      {"id": "ORR-DEP-03", "q": "Is automated rollback on failure configured?", "best": "Deployment systems automatically rollback when health checks fail. CloudWatch alarms trigger rollback in CodeDeploy or equivalent. Rollback criteria are defined (error rate threshold, latency threshold, health check failures). Rollback completes within acceptable time bounds. Rollback does not require human intervention for common failure modes."},
      {"id": "ORR-DEP-04", "q": "Are all changes peer-reviewed before production?", "best": "All code and infrastructure changes require peer review before merging. Reviews check for: correctness, security implications, operational impact, and test coverage. Reviewers have appropriate context and expertise. Review turnaround times are tracked. Emergency changes have post-hoc review within 24 hours."},
      {"id": "ORR-DEP-05", "q": "Does deployment to production include validation tests before traffic routing?", "best": "After deploying to production (but before routing live traffic), automated validation tests confirm the deployment is healthy. Tests check: application health endpoints, key functionality, database connectivity, and downstream dependencies. Traffic is only routed to new instances after validation passes. Failed validations trigger automatic rollback."}
    ]},
    {"name": "Governance & Readiness", "questions": [
      {"id": "ORR-GOV-01", "q": "Is an operational readiness sign-off process defined?", "best": "A formal sign-off process exists before services go to production. Sign-off criteria cover: all ORR checklist items addressed (or accepted risks documented), load testing completed, DR tested, monitoring in place, and runbooks written. Sign-off is documented with accountable approvers."},
      {"id": "ORR-GOV-02", "q": "Is the risk register updated?", "best": "A risk register captures identified risks with: description, likelihood, impact, mitigation strategy, owner, and review date. Risks are reviewed regularly (at least quarterly). New risks from architecture changes, incidents, or ORR findings are added promptly. Accepted risks have documented justification and review cadence."},
      {"id": "ORR-GOV-03", "q": "Is team training and enablement completed?", "best": "Team members are trained on: the services they operate, AWS services in use, incident response procedures, and deployment processes. Training gaps are identified and addressed. New team members have an onboarding programme. Regular knowledge-sharing sessions maintain team capability. AWS training and certification paths are supported."},
      {"id": "ORR-GOV-04", "q": "Is documentation up to date and accessible?", "best": "Operational documentation is current, version-controlled, and accessible to all relevant team members. Documentation covers: architecture, runbooks, deployment procedures, on-call guides, and decision records. A documentation review cadence ensures accuracy. Documentation is treated as code — reviewed, versioned, and maintained."},
      {"id": "ORR-GOV-05", "q": "Is a communication plan for incidents defined (internal + external)?", "best": "Communication procedures are defined for both internal stakeholders (engineering, management, dependent teams) and external parties (customers, partners) during incidents. Templates exist for status updates at each severity level. Communication channels are defined (Slack, email, status page). Responsibilities for communication are assigned."}
    ]}
  ]
};

function getTemplates() {
  var t = localStorage.getItem('wafr-templates');
  if (!t) {
    localStorage.setItem('wafr-templates', JSON.stringify([DEFAULT_TEMPLATE, ORR_TEMPLATE]));
    return [DEFAULT_TEMPLATE, ORR_TEMPLATE];
  }
  var parsed = JSON.parse(t);
  // Ensure default templates are always present
  if (!parsed.find(function(x) { return x.id === 'workspaces-default'; })) {
    parsed.unshift(DEFAULT_TEMPLATE);
  }
  if (!parsed.find(function(x) { return x.id === 'orr-default'; })) {
    parsed.push(ORR_TEMPLATE);
  }
  localStorage.setItem('wafr-templates', JSON.stringify(parsed));
  return parsed;
}

function saveTemplates(templates) {
  localStorage.setItem('wafr-templates', JSON.stringify(templates));
}

function getReviews() {
  var r = localStorage.getItem('wafr-reviews');
  return r ? JSON.parse(r) : [];
}

function saveReviews(reviews) {
  localStorage.setItem('wafr-reviews', JSON.stringify(reviews));
}

function getReview(id) {
  return getReviews().find(function(r) { return r.id === id; });
}

function updateReview(review) {
  var reviews = getReviews();
  var idx = reviews.findIndex(function(r) { return r.id === review.id; });
  if (idx >= 0) reviews[idx] = review;
  saveReviews(reviews);
  syncReviewToCloud(review);
}

// === SCORING ===
function getScoreValue(answer) {
  if (answer === 'fully') return 100;
  if (answer === 'partial') return 50;
  if (answer === 'not') return 0;
  return -1; // N/A
}

function getPillarScore(review, pillarIdx) {
  var pillar = review.pillars[pillarIdx];
  var total = 0, count = 0, answered = 0;
  pillar.questions.forEach(function(q) {
    var a = review.answers[q.id];
    if (a && a.score) {
      answered++;
      var v = getScoreValue(a.score);
      if (v >= 0) { total += v; count++; }
    }
  });
  var pct = count > 0 ? Math.round(total / count) : 0;
  return { pct: pct, answered: answered, total: pillar.questions.length, count: count };
}

function getOverallScore(review) {
  var total = 0, count = 0;
  review.pillars.forEach(function(_, i) {
    var s = getPillarScore(review, i);
    if (s.count > 0) { total += s.pct; count++; }
  });
  return count > 0 ? Math.round(total / count) : 0;
}

function getRag(pct) {
  if (pct >= 80) return 'green';
  if (pct >= 40) return 'amber';
  return 'red';
}

function closeModal(e) {
  if (!e || e.target.classList.contains('modal-overlay')) {
    document.getElementById('modal-root').innerHTML = '';
  }
}

function parseCSVRow(row) {
  var result = [], cur = '', inQuote = false;
  for (var i = 0; i < row.length; i++) {
    var c = row[i];
    if (c === '"') { inQuote = !inQuote; }
    else if (c === ',' && !inQuote) { result.push(cur.trim()); cur = ''; }
    else { cur += c; }
  }
  result.push(cur.trim());
  return result;
}

function createReview() {
  var templateId = document.getElementById('m-template').value;
  var customer = document.getElementById('m-customer').value.trim();
  var reviewer = document.getElementById('m-reviewer').value.trim();
  var date = document.getElementById('m-date').value;
  var csvFile = document.getElementById('m-csv').files[0];

  if (!customer) { alert('Please enter a customer name'); return; }

  var templates = getTemplates();
  var template = templates.find(function(t) { return t.id === templateId; });
  if (!template) return;

  function buildAndSave(answers) {
    var review = {
      id: 'review-' + Date.now(),
      customer: customer, reviewer: reviewer, date: date,
      template: template.name, templateId: template.id,
      pillars: JSON.parse(JSON.stringify(template.pillars)),
      answers: answers || {}, createdAt: new Date().toISOString()
    };
    var reviews = getReviews();
    reviews.unshift(review);
    saveReviews(reviews);
    syncReviewToCloud(review);
    closeModal();
    openReview(review.id);
  }

  if (!csvFile) { buildAndSave({}); return; }

  var reader = new FileReader();
  reader.onload = function(ev) {
    var lines = ev.target.result.split(/\r?\n/);
    // Find header row — look for a row containing "ID"
    var headerIdx = lines.findIndex(function(l) { return /^"?ID"?[,\t]/i.test(l.trim()); });
    if (headerIdx < 0) { alert('Could not find header row with "ID" column. Please check the CSV.'); return; }
    var headers = parseCSVRow(lines[headerIdx]).map(function(h) { return h.replace(/^"|"$/g, '').trim().toLowerCase(); });
    var idCol = headers.indexOf('id');
    var notesCol = headers.findIndex(function(h) { return h.includes('info from customer'); });
    var scoreCol = headers.findIndex(function(h) { return h.includes('assessment'); });
    if (idCol < 0 || notesCol < 0) { alert('CSV must have "ID" and "Info from Customer" columns.'); return; }
    function mapScore(val) {
      val = (val || '').toLowerCase().trim();
      if (val.includes('fully') || val === 'full' || val === 'yes') return 'fully';
      if (val.includes('partial')) return 'partial';
      if (val.includes('n/a') || val.includes('not applicable') || val === 'na') return 'na';
      if (val.includes('not') || val === 'no') return 'not';
      return 'not';
    }
    var answers = {};
    var imported = 0;
    for (var i = headerIdx + 1; i < lines.length; i++) {
      if (!lines[i].trim()) continue;
      var cols = parseCSVRow(lines[i]);
      var id = (cols[idCol] || '').replace(/^"|"$/g, '').trim();
      var notes = (cols[notesCol] || '').replace(/^"|"$/g, '').trim();
      var scoreRaw = scoreCol >= 0 ? (cols[scoreCol] || '').replace(/^"|"$/g, '').trim() : '';
      if (id && notes) { answers[id] = { score: mapScore(scoreRaw), notes: notes }; imported++; }
    }
    buildAndSave(answers);
    if (imported > 0) { appLog('CSV import: ' + imported + ' questions loaded for ' + customer, 'success'); setTimeout(function() { alert(imported + ' questions imported from spreadsheet.'); }, 300); }
  };
  reader.readAsText(csvFile);
}

function renderRadar(review) {
  var scores = review.pillars.map(function(_, i) { return getPillarScore(review, i).pct; });
  var labels = review.pillars.map(function(p) { return p.name.split(' ').slice(0, 2).join(' '); });
  var cx = 150, cy = 150, r = 110, n = scores.length;
  var step = (2 * Math.PI) / n;
  var start = -Math.PI / 2;
  var svg = '<svg width="300" height="300" viewBox="0 0 300 300">';
  
  // Grid
  [20,40,60,80,100].forEach(function(pct) {
    var gr = r * pct / 100;
    var pts = [];
    for (var i = 0; i < n; i++) {
      var a = start + i * step;
      pts.push((cx + gr * Math.cos(a)).toFixed(1) + ',' + (cy + gr * Math.sin(a)).toFixed(1));
    }
    svg += '<polygon points="' + pts.join(' ') + '" fill="none" stroke="#e1e4e8" stroke-width="0.5"/>';
  });
  
  // Axes
  for (var i = 0; i < n; i++) {
    var a = start + i * step;
    svg += '<line x1="' + cx + '" y1="' + cy + '" x2="' + (cx + r * Math.cos(a)).toFixed(1) + '" y2="' + (cy + r * Math.sin(a)).toFixed(1) + '" stroke="#e1e4e8" stroke-width="0.5"/>';
  }
  
  // Data
  var pts = [];
  for (var i = 0; i < n; i++) {
    var a = start + i * step;
    var dr = r * scores[i] / 100;
    pts.push((cx + dr * Math.cos(a)).toFixed(1) + ',' + (cy + dr * Math.sin(a)).toFixed(1));
  }
  svg += '<polygon points="' + pts.join(' ') + '" fill="rgba(255,153,0,0.2)" stroke="#ff9900" stroke-width="2"/>';
  
  // Labels
  for (var i = 0; i < n; i++) {
    var a = start + i * step;
    var lx = cx + (r + 25) * Math.cos(a);
    var ly = cy + (r + 25) * Math.sin(a);
    svg += '<text x="' + lx.toFixed(1) + '" y="' + ly.toFixed(1) + '" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#545b64">' + labels[i] + '</text>';
  }
  
  svg += '</svg>';
  return svg;
}

    html += '<button class="btn" onclick="prevQuestion()">Previous</button>';
  } else {

function toggleExplainPanel() {
  var content = document.getElementById('explain-content');
  var btn = document.querySelector('.explain-toggle');
  explainPanelVisible = !explainPanelVisible;
  if (explainPanelVisible) {
    content.style.display = 'block';
    btn.textContent = '\u2212';
  } else {
    content.style.display = 'none';
    btn.textContent = '+';
  }
}

async function loadExplanation(question, bestPractice, templateId) {
  var el = document.getElementById('explain-content');
  if (!el) return;
  el.innerHTML = '<div class="explain-loading">Loading AI guidance...</div>';
  try {
    var res = await fetch(ENV.explainEndpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: question, bestPractice: bestPractice, templateId: templateId || 'workspaces-default' })
    });
    var data = await res.json();
    el.innerHTML = '<div class="explain-text">' + data.explanation
      .replace(/What to ask the [Cc]ustomer/gi, 'Questions to think about')
      .replace(/\n/g, '<br>')
      .replace(/#{1,3} (.*?)(<br>|$)/g, '<strong>$1</strong>$2')
      .replace(/\*\*(\d+\..+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*\*([^*]{1,50}:)\*\*/g, '<strong>$1</strong>')
      .replace(/\*\*/g, '')
      .replace(/- /g, '&bull; ')
      .replace(/\* /g, '&bull; ') + '</div>';
  } catch(e) {
    el.innerHTML = '<div class="explain-error">Could not load guidance. Check network connection.</div>';
  }
}

function setAnswer(qId, score) {
  var review = getReview(state.activeReview);
  if (!review.answers[qId]) review.answers[qId] = {};
  review.answers[qId].score = score;
  // Preserve notes
  var notesEl = document.getElementById('notes-input');
  if (notesEl) review.answers[qId].notes = notesEl.value;
  updateReview(review);
  renderQuestion();
}

function saveNotes(qId) {
  var review = getReview(state.activeReview);
  if (!review.answers[qId]) review.answers[qId] = {};
  var notesEl = document.getElementById('notes-input');
  if (notesEl) review.answers[qId].notes = notesEl.value;
  updateReview(review);
}

function prevQuestion() {
  saveCurrentNotes();
  if (state.activeQuestion > 0) { state.activeQuestion--; renderQuestion(); }
}

function nextQuestion() {
  saveCurrentNotes();
  var review = getReview(state.activeReview);
  if (state.activeQuestion < review.pillars[state.activePillar].questions.length - 1) {
    state.activeQuestion++; renderQuestion();
  }
}

function saveCurrentNotes() {
  var review = getReview(state.activeReview);
  var pillar = review.pillars[state.activePillar];
  var q = pillar.questions[state.activeQuestion];
  var notesEl = document.getElementById('notes-input');
  if (notesEl) {
    if (!review.answers[q.id]) review.answers[q.id] = {};
    review.answers[q.id].notes = notesEl.value;
    updateReview(review);
  }
}

async function sendEmailReport(id) {
  var recipient = document.getElementById('m-email-to').value.trim();
  if (!recipient) { alert('Please enter an email address'); return; }
  var statusEl = document.getElementById('email-status');
  var btn = document.getElementById('email-send-btn');
  btn.disabled = true;
  var review = getReview(id);
  var selectedReport = document.getElementById('m-email-report-select').value;
  var htmlReport;

  if (selectedReport) {
    // Check if it's a PPTX file
    var selEl = document.getElementById('m-email-report-select');
    var selectedOpt = selEl.options[selEl.selectedIndex];
    if (selectedOpt.dataset && selectedOpt.dataset.format === 'pptx') {
      statusEl.innerHTML = '<span style="color:#d13212">Cannot email PPTX files directly. Use Saved Reports to download it instead.</span>';
      btn.disabled = false;
      return;
    }
    // Use a previously saved HTML report
    statusEl.innerHTML = '<span style="color:#ff9900">Fetching saved report...</span>';
    try {
      var r = await fetch(ENV.emailEndpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'getReport', key: selectedReport }) });
      var d = await r.json(); var p = typeof d.body === 'string' ? JSON.parse(d.body) : d;
      htmlReport = atob(p.data);
    } catch(e) { statusEl.innerHTML = '<span style="color:#d13212">Error fetching report.</span>'; btn.disabled = false; return; }
  } else {
    // Generate a new report
    statusEl.innerHTML = '<span style="color:#ff9900">Loading architecture context...</span>';
    var archCtx = await loadArchContext(id);
    if (archCtx) window._pdfReferenceContext = (window._pdfReferenceContext || '') + '\n\n' + archCtx;
    statusEl.innerHTML = '<span style="color:#ff9900">Generating tailored report...</span>';
    htmlReport = await generateTailoredReport(review);
    window._pdfReferenceContext = '';
  }
  statusEl.innerHTML = '<span style="color:#ff9900">Sending email...</span>';
  try {
    var res = await fetch(ENV.emailEndpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'email', recipient: recipient, htmlReport: htmlReport, customerName: review.customer, reviewDate: review.date })
    });
    var data = await res.json();
    if (res.ok) {
      statusEl.innerHTML = '<span style="color:#1d8102">Report sent successfully!</span>';
      setTimeout(closeModal, 1500);
    } else {
      statusEl.innerHTML = '<span style="color:#d13212">Error: ' + (data.error || 'Send failed') + '</span>';
      btn.disabled = false;
    }
  } catch(e) {
    statusEl.innerHTML = '<span style="color:#d13212">Network error. Please try again.</span>';
    btn.disabled = false;
  }
}


// === IMPORT/EXPORT ===
function exportTemplate(id) {
  var templates = getTemplates();
  var template = null;
  for (var i = 0; i < templates.length; i++) { if (templates[i].id === id) { template = templates[i]; break; } }
  if (!template) return;
  var blob = new Blob([JSON.stringify(template, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href = url;
  a.download = template.name.replace(/[^a-z0-9]/gi, '-').toLowerCase() + '-template.json';
  a.click(); URL.revokeObjectURL(url);
}

function importTemplate() {
  var input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
  input.onchange = function(e) {
    var file = e.target.files[0]; if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        if (!data.name || !data.pillars || !Array.isArray(data.pillars)) { alert('Invalid template file. Must contain "name" and "pillars" array.'); return; }
        for (var i = 0; i < data.pillars.length; i++) {
          if (!data.pillars[i].name || !data.pillars[i].questions) { alert('Invalid: each pillar must have "name" and "questions".'); return; }
        }
        if (!data.id) data.id = 'imported-' + Date.now();
        var templates = getTemplates();
        var existing = -1;
        for (var j = 0; j < templates.length; j++) { if (templates[j].id === data.id) { existing = j; break; } }
        if (existing >= 0) { if (!confirm('Template exists. Overwrite?')) return; templates[existing] = data; }
        else { templates.push(data); }
        saveTemplates(templates); showHome();
        alert('Template "' + data.name + '" imported successfully.');
      } catch(err) { alert('Error: ' + err.message); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function importReview() {
  var input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
  input.onchange = function(e) {
    var file = e.target.files[0]; if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        if (!data.pillars || !data.answers) { alert('Invalid review file. Must contain pillars and answers.'); return; }
        window._importedReviewData = data;
        showImportOptionsModal(data);
      } catch(err) { alert('Error: ' + err.message); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function executeImportReview() {
  var data = window._importedReviewData;
  if (!data) { alert('No import data found.'); return; }
  var mode = document.querySelector('input[name="import-mode"]:checked').value;
  var reviews = getReviews();

  if (mode === 'overwrite') {
    var targetId = document.getElementById('import-target-review').value;
    if (!targetId) { alert('Please select a review to overwrite.'); return; }
    var idx = -1;
    for (var i = 0; i < reviews.length; i++) { if (reviews[i].id === targetId) { idx = i; break; } }
    if (idx === -1) { alert('Review not found.'); return; }
    // Overwrite answers and notes
    reviews[idx].answers = data.answers;
    if (data.notes) reviews[idx].notes = data.notes;
    saveReviews(reviews);
    syncReviewToCloud(reviews[idx]);
    closeModal();
    showHome();
    alert('Answers imported into "' + reviews[idx].customer + '" successfully.');
  } else {
    var newName = document.getElementById('import-new-name').value.trim();
    if (!newName) { alert('Please enter a customer name for the new review.'); return; }
    var newReview = JSON.parse(JSON.stringify(data));
    newReview.id = 'imported-' + Date.now();
    newReview.customer = newName;
    newReview.date = new Date().toISOString().split('T')[0];
    if (!newReview.reviewer) newReview.reviewer = (currentUser && currentUser.username) || 'Imported';
    if (!newReview.status) newReview.status = 'In Progress';
    reviews.push(newReview);
    saveReviews(reviews);
    syncReviewToCloud(newReview);
    closeModal();
    showHome();
    alert('New review created for "' + newName + '" with imported answers.');
  }
  window._importedReviewData = null;
}

  if (id === 'workspaces-default' || id === 'orr-default') { alert('Cannot delete built-in templates.'); return; }
  if (!confirm('Delete this template?')) return;
  var templates = getTemplates().filter(function(t) { return t.id !== id; });
  saveTemplates(templates); showHome();
}

async function generateTailoredReport(review) {
  var questionsWithNotes = [];
  review.pillars.forEach(function(p) {
    p.questions.forEach(function(q) {
      var a = review.answers[q.id];
      if (a && a.notes && a.notes.trim()) {
        questionsWithNotes.push({ id: q.id, question: q.q, score: a.score || '', notes: a.notes, best: q.best });
      }
    });
  });
  var recommendations = {};
  if (questionsWithNotes.length > 0) {
    var BATCH_SIZE = 5;
    for (var i = 0; i < questionsWithNotes.length; i += BATCH_SIZE) {
      var batch = questionsWithNotes.slice(i, i + BATCH_SIZE);
      try {
        var fetchBody = { action: 'generate', questions: batch };
        if (window._pdfReferenceContext) fetchBody.referenceContext = window._pdfReferenceContext;
        if (review.templateId) fetchBody.templateId = review.templateId;
        var res = await fetch(ENV.emailEndpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(fetchBody)
        });
        var data = await res.json();
        var payload = typeof data.body === 'string' ? JSON.parse(data.body) : data;
        if (payload.recommendations) Object.assign(recommendations, payload.recommendations);
      } catch(e) { console.log('Tailored generation error (batch ' + (i/BATCH_SIZE+1) + '):', e); }
    }
  }
  window._lastRecommendations = recommendations;
  return generateReportHTML(review, recommendations);
}

function generateSoWhatHTML(review, recommendations) {

    if (!text) return text;
    return text.replace(/\u2014/g, '&mdash;').replace(/\u2013/g, '&ndash;').replace(/\u2018/g, '&lsquo;').replace(/\u2019/g, '&rsquo;').replace(/\u201C/g, '&ldquo;').replace(/\u201D/g, '&rdquo;').replace(/\u2026/g, '&hellip;').replace(/\u00A0/g, '&nbsp;');
  }
  var customerName = sanitizeForHTML(review.customer || 'Review');
  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>So What? - ' + customerName + '</title>';
  html += '<style>body{font-family:-apple-system,sans-serif;max-width:900px;margin:0 auto;padding:40px 20px;color:#1a1a1a;} h1{color:#232f3e;margin-bottom:4px;} .subtitle{color:#5f6b7a;margin-bottom:30px;} .q-card{border:1px solid #e0e0e0;border-radius:8px;padding:20px;margin-bottom:16px;} .q-id{font-weight:700;color:#0073bb;font-size:13px;} .q-text{font-size:15px;margin:4px 0 12px;} .q-obs{background:#f5f5f5;border-left:4px solid #879596;padding:12px;margin-bottom:10px;border-radius:4px;font-size:14px;} .q-rec{background:#f0f4ff;border-left:4px solid #0073bb;padding:12px;border-radius:4px;font-size:14px;} .q-rec a{color:#0073bb;} .footer{margin-top:40px;padding-top:16px;border-top:1px solid #e0e0e0;font-size:12px;color:#5f6b7a;} @media print{.no-print{display:none!important;}}</style></head><body>';
  html += '<div class="no-print"><button onclick="window.print()">Save as PDF (Cmd+P)</button><button onclick="window.close()">Close</button><p>Use Cmd+P (Mac) or Ctrl+P (Windows) to save as PDF.</p></div>';
  html += '<h1>So What? - ' + customerName + '</h1>';
  html += '<div class="subtitle">Key findings and recommended actions | ' + (review.date || new Date().toISOString().split('T')[0]) + '</div>';
  review.pillars.forEach(function(p) {
    p.questions.forEach(function(q) {
      var rec = recommendations[q.id];
      if (!rec) return;
      html += '<div class="q-card"><div class="q-id">' + q.id + '</div><div class="q-text">' + q.q + '</div>';
      if (rec.observation) html += '<div class="q-obs"><strong>What we found:</strong> ' + sanitizeForHTML(rec.observation) + '</div>';
      if (rec.recommendation) html += '<div class="q-rec"><strong>What to do:</strong> ' + sanitizeForHTML(rec.recommendation).replace(/\n/g, '<br>').replace(/(https:\/\/docs\.aws\.amazon\.com\/[^\s<]+)/g, '<a href="$1" target="_blank">$1</a>') + '</div>';
      if (rec.userImpact) html += '<div class="q-obs" style="border-left-color:#0073bb;background:#f0f8ff;"><strong>What this means for users:</strong> ' + sanitizeForHTML(rec.userImpact) + '</div>';
      html += '</div>';
    });
  });
  html += '<div class="footer">Generated by AWS WorkSpaces WAFR Review Tool | ' + new Date().toISOString().split('T')[0] + '</div></body></html>';
  return html;
}

async function handlePrintReport(id) {
  var selectedReport = document.getElementById('m-print-report-select').value;
  var statusEl = document.getElementById('print-status');

  if (selectedReport) {
    // Check if it's a PPTX file
    var selEl = document.getElementById('m-print-report-select');
    var selectedOpt = selEl.options[selEl.selectedIndex];
    if (selectedOpt.dataset && selectedOpt.dataset.format === 'pptx') {
      statusEl.innerHTML = '<span style="color:#ff9900">Downloading PPTX...</span>';
      try {
        var r = await fetch(ENV.emailEndpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'getReport', key: selectedReport }) });
        var d = await r.json(); var p = typeof d.body === 'string' ? JSON.parse(d.body) : d;
        var bytes = Uint8Array.from(atob(p.data), function(c) { return c.charCodeAt(0); });
        var blob = new Blob([bytes], { type: 'application/vnd.openxmlformats-officedocument.presentationml.presentation' });
        var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = p.filename || 'report.pptx'; a.click();
        closeModal();
      } catch(e) { statusEl.innerHTML = '<span style="color:#d13212">Error downloading file.</span>'; }
      return;
    }
    // Open a previously saved HTML report
    statusEl.innerHTML = '<span style="color:#ff9900">Fetching saved report...</span>';
    try {
      var r = await fetch(ENV.emailEndpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'getReport', key: selectedReport }) });
      var d = await r.json(); var p = typeof d.body === 'string' ? JSON.parse(d.body) : d;
      var html = atob(p.data);
      closeModal();
      openReportInNewTab(html);
    } catch(e) { statusEl.innerHTML = '<span style="color:#d13212">Error fetching report.</span>'; }
  } else {
    // Generate new
    closeModal();
    exportReviewAsPrintHTML(id);
  }
}

function loadReportSelectOptions(reviewId, selectId) {
  fetch(ENV.emailEndpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'listReports', reviewId: reviewId })
  }).then(function(r) { return r.json(); }).then(function(d) {
    var payload = typeof d.body === 'string' ? JSON.parse(d.body) : d;
    var reports = payload.reports || [];

async function generateWafrWithArchSelection(id) {
  // Collect selected arch doc keys
  var checkboxes = document.querySelectorAll('.arch-select-cb:checked');
  var selectedKeys = [];
  checkboxes.forEach(function(cb) { selectedKeys.push(cb.value); });

  closeModal();
  showGeneratingOverlay();

  var review = getReview(id);
  window._archFindings = null;

  // Step 1: Load arch context and run architecture analysis
  var archContext = '';
  if (selectedKeys.length > 0) {
    console.log('Loading architecture context for', selectedKeys.length, 'documents');
    try {
      // Fetch extracted text for selected docs
      var contextParts = [];
      for (var i = 0; i < selectedKeys.length; i++) {
        var textKey = selectedKeys[i] + '.extracted.txt';
        var r = await fetch(ENV.emailEndpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'getReport', key: textKey }) });
        var d = await r.json(); var p = typeof d.body === 'string' ? JSON.parse(d.body) : d;
        if (p.data) {
          var text = atob(p.data);
          var filename = selectedKeys[i].split('/').pop().split('_').slice(1).join('_');
          contextParts.push('=== Architecture Document: ' + filename + ' ===\n' + text);
        }
      }
      if (contextParts.length > 0) {
        archContext = contextParts.join('\n\n');
      }
    } catch(e) { console.log('Arch context load error (non-fatal):', e); }

    // Run architecture analysis with retry logic for cold starts
    if (archContext) {
      console.log('Running architecture analysis...');
      try {
        var analysisPrompt = [{
          id: 'ARCH-ANALYSIS',
          question: 'Analyse this architecture against AWS Well-Architected Framework pillars',
          score: 'analysis',
          notes: 'Perform a full architecture assessment',
          best: 'Identify gaps, risks, improvements, and positives per pillar.'
        }];
        var analysisBody = JSON.stringify({
          action: 'generate',
          questions: analysisPrompt,
          reviewId: review.id,
          isArchAnalysis: true
        });
        var analysisRes = null;
        for (var attempt = 0; attempt < 4; attempt++) {
          analysisRes = await fetch(ENV.emailEndpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: analysisBody
          });
          if (analysisRes.status !== 503) break;
          console.log('Arch analysis attempt ' + (attempt + 1) + ' got 503, retrying in 3s...');
          await new Promise(function(resolve) { setTimeout(resolve, 3000); });
        }
        if (analysisRes && analysisRes.ok) {
          var analysisData = await analysisRes.json();
          var analysisPayload = typeof analysisData.body === 'string' ? JSON.parse(analysisData.body) : analysisData;
          if (analysisPayload.recommendations && analysisPayload.recommendations['ARCH-ANALYSIS']) {
            window._archFindings = {
              summary: analysisPayload.recommendations['ARCH-ANALYSIS'].observation || '',
              details: analysisPayload.recommendations['ARCH-ANALYSIS'].recommendation || ''
            };
            console.log('Architecture analysis complete');
          }
        } else {
          console.log('Architecture analysis failed after retries');
        }
      } catch(e) { console.log('Architecture analysis error (non-fatal):', e); }
    }
  } else {
    console.log('No arch docs selected, skipping analysis');
  }

  // Step 2: Generate per-question recommendations with arch context
  if (archContext) {
    window._pdfReferenceContext = '\n\nARCHITECTURE CONTEXT:\n' + archContext;
  }
  try {
    var html = await generateTailoredReport(review);
    hideGeneratingOverlay();
    window._pdfReferenceContext = '';
    saveReportToCloud(review.id, 'standard', html, 'text/html', 'html', review.customer);
    openReportInNewTab(html);
  } catch(e) {
    hideGeneratingOverlay();
    window._pdfReferenceContext = '';
    console.error('Report generation error:', e);
  }
}
