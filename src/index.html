async function generateOrrTailoredReport(review) {
  var questionsWithNotes = [];
  review.pillars.forEach(function(p) {
    p.questions.forEach(function(q) {
      var a = review.answers[q.id];
      if (a && a.score) {
        questionsWithNotes.push({ id: q.id, question: q.q, score: a.score || '', notes: a.notes || 'No additional notes provided.', best: q.best });
      }
    });
  });
  var recommendations = {};
  if (questionsWithNotes.length > 0) {
    var BATCH_SIZE = 5;
    for (var i = 0; i < questionsWithNotes.length; i += BATCH_SIZE) {
      var batch = questionsWithNotes.slice(i, i + BATCH_SIZE);
      try {
        var res = await fetch(ENV.emailEndpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'generateOrr', questions: batch })
        });
        var data = await res.json();
        var payload = typeof data.body === 'string' ? JSON.parse(data.body) : data;
        if (payload.recommendations) Object.assign(recommendations, payload.recommendations);
      } catch(e) { console.log('ORR generation error (batch ' + (i/BATCH_SIZE+1) + '):', e); }
    }
  }
  window._lastOrrRecommendations = recommendations;
}

879596;} .priority-critical{background:#d13212;color:white;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;} .priority-high{background:#f2a20d;color:white;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;} .priority-medium{background:#0073bb;color:white;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;} .priority-low{background:#879596;color:white;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;} .footer{margin-top:40px;padding-top:16px;border-top:1px solid #e0e0e0;font-size:12px;color:#5f6b7a;} @media print{.no-print{display:none!important;}}</style></head><body>';

async function startCLevelDeck(id) {
  var review = getReview(id); if (!review) return;
  var sowhatKey = document.getElementById('deck-sowhat-select').value;
  var wafrKey = document.getElementById('deck-wafr-select').value;
  var notifyEmail = (document.getElementById('deck-notify-email').value || '').trim();
  var statusEl = document.getElementById('deck-status');
  statusEl.innerHTML = '<span style="color:#ff9900">Fetching report content...</span>';
  var refContext = '';
  try {
    if (sowhatKey) {
      var r1 = await fetch(ENV.emailEndpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'getReport', key: sowhatKey }) });
      var d1 = await r1.json(); var p1 = typeof d1.body === 'string' ? JSON.parse(d1.body) : d1;
      var t1 = atob(p1.data);
      refContext += '=== SO WHAT REPORT ===\n' + t1.replace(/<[^>]+>/g,' ').substring(0, 15000) + '\n\n';
    }
    if (wafrKey) {
      var r2 = await fetch(ENV.emailEndpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'getReport', key: wafrKey }) });
      var d2 = await r2.json(); var p2 = typeof d2.body === 'string' ? JSON.parse(d2.body) : d2;
      var t2 = atob(p2.data);
      refContext += '=== WAFR REPORT ===\n' + t2.replace(/<[^>]+>/g,' ').substring(0, 15000) + '\n\n';
    }
  } catch(e) { console.log('Report fetch error:', e); }

  // Also load architecture context
  try {
    var archCtx = await loadArchContext(id);
    if (archCtx) refContext += archCtx;
  } catch(e) { console.log('Arch context load error (non-fatal):', e); }

  closeModal();
  showGeneratingOverlay();
  var deckFilename = 'WAFR_Executive_Briefing_' + (review.customer || 'Customer').replace(/[^a-zA-Z0-9]/g, '_') + '_' + (review.date || new Date().toISOString().split('T')[0]) + '.pptx';

  // Collect all findings for curation
  var findings = [];
  var pillarScores = [];
  review.pillars.forEach(function(p, i) {
    var ps = getPillarScore(review, i);
    pillarScores.push({ name: p.name, score: ps.pct, rag: getRag(ps.pct) });
    p.questions.forEach(function(q) {
      var a = review.answers[q.id] || {};
      if (!a.score) return;
      var rec = (window._lastRecommendations && window._lastRecommendations[q.id]) || {};
      findings.push({
        id: q.id, pillar: p.name, question: q.q, score: a.score,
        notes: a.notes || '', observation: rec.observation || '', recommendation: rec.recommendation || ''
      });
    });
  });
  var overall = getOverallScore(review);

  // First generate tailored recommendations (reuses existing batched flow)
  window._pdfReferenceContext = refContext || '';
  try {
    await generateTailoredReport(review);
  } catch(e) { console.log('Tailored report generation error (non-fatal):', e); }
  window._pdfReferenceContext = '';

  // Re-collect findings with recommendations now available
  findings = [];
  review.pillars.forEach(function(p) {
    p.questions.forEach(function(q) {
      var a = review.answers[q.id] || {};
      if (!a.score) return;
      var rec = (window._lastRecommendations && window._lastRecommendations[q.id]) || {};
      findings.push({
        id: q.id, pillar: p.name, question: q.q, score: a.score,
        notes: a.notes || '', observation: rec.observation || '', recommendation: rec.recommendation || ''
      });
    });
  });

  // Call curateDeck Lambda action
  try {
    var curationRes = await fetch(ENV.emailEndpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'curateDeck',
        findings: findings,
        overallScore: overall,
        pillarScores: pillarScores,
        customerName: review.customer || 'Customer',
        referenceContext: refContext,
        templateId: review.templateId || 'workspaces-default'
      })
    });
    var curationData = await curationRes.json();
    var curationPayload = typeof curationData.body === 'string' ? JSON.parse(curationData.body) : curationData;

    if (curationPayload.curated) {
      hideGeneratingOverlay();
      buildCuratedCLevelPptx(review, curationPayload.curated, pillarScores, overall, notifyEmail, deckFilename);
    } else {
      // Curation failed — fall back to mechanical build
      console.error('Curation failed, falling back:', curationPayload.error);
      hideGeneratingOverlay();
      buildCLevelPptx(review, window._lastRecommendations || {}, notifyEmail);
      alert('Note: AI curation was unavailable - deck was generated using the standard layout.');
    }
  } catch(e) {
    console.error('Curation call failed:', e);
    hideGeneratingOverlay();
    try {
      buildCLevelPptx(review, window._lastRecommendations || {}, notifyEmail);
      alert('Note: AI curation was unavailable - deck was generated using the standard layout.');
    } catch(e2) {
      alert('Error building PowerPoint: ' + e2.message);
      if (notifyEmail) sendDeckNotification(notifyEmail, review.customer, deckFilename, false, e2.message);
    }
  }
}

function sendDeckNotification(recipient, customerName, filename, success, detail) {
  var subject = success ? 'C-Level Deck Generated Successfully - ' + customerName : 'C-Level Deck Generation Failed - ' + customerName;
  var bodyHtml = success
    ? '<p>The C-Level Executive Briefing for <strong>' + customerName + '</strong> was generated successfully.</p><p><strong>File:</strong> ' + filename + '</p>' + (detail ? '<p><strong>Note:</strong> ' + detail + '</p>' : '') + '<p>Access the deck from Saved Reports in the WAFR Tool.</p>'
    : '<p>The C-Level Executive Briefing for <strong>' + customerName + '</strong> failed to generate.</p><p><strong>Error:</strong> ' + detail + '</p><p>Please try again or check the browser console for more details.</p>';
  console.log('Sending deck notification to:', recipient, 'success:', success);
  fetch(ENV.emailEndpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'notify', recipient: recipient, subject: subject, htmlBody: bodyHtml })
  }).then(function(r) { return r.json(); }).then(function(d) {
    console.log('Deck notification response:', d);
  }).catch(function(e) { console.log('Notification email error:', e); });
}

function buildCLevelPptx(review, recommendations, notifyEmail) {

      var rec = recommendations[q.id];
      var item = { id: q.id, question: q.q, pillar: p.name, score: a.score, notes: a.notes || '', rec: rec };

  // Helper: add slide with dark header bar

  function addContentSlide(title) {

  function ragColor(score) { return score >= 80 ? GREEN : score >= 40 ? AMBER : RED; }

  function truncate(str, max) { return str && str.length > max ? str.substring(0, max - 3) + '...' : (str || ''); }
  function shortLabel(item) {
    var q = item.question || '';
    // Strip "How do you " prefix to get the meaningful part
    q = q.replace(/^How do you\s+/i, '').replace(/\?$/, '');
    // Capitalise first letter
    q = q.charAt(0).toUpperCase() + q.slice(1);
    // No truncation — let pptxgenjs wrap text within the box
    return item.id + ' — ' + q;
  }

  // SLIDE 1: Cover
  var s1 = addTitleSlide(customer + '\nWorkSpaces Well-Architected Review', 'C-Level Executive Briefing | ' + today);

  // SLIDE 2: How to Read This Deck
  var s2 = addContentSlide('How to Read This Deck');

  var howRows = [
    [{ text: 'MUST', options: { bold: true, color: WHITE } }, { text: 'Urgent — highest assurance, often least effort. Address immediately.' }],
    [{ text: 'SHOULD', options: { bold: true, color: SQUID } }, { text: 'High value — plan this quarter. Meaningful risk reduction.' }],
    [{ text: 'COULD', options: { bold: true, color: SQUID } }, { text: 'Strategic improvements — more effort, longer-term benefit.' }]

  s2.addText('Flow: Most impactful / least effort → Impactful / more effort', { x: 0.5, y: 3.8, w: 12, fontSize: 12, italic: true, color: GREY, fontFace: 'Calibri' });

  // SLIDE 3: Executive Summary

  s3.addText('Overall Score — ' + ragLabel(overall), { x: 4, y: 3.0, w: 5.5, fontSize: 16, align: 'center', color: SQUID, fontFace: 'Calibri' });
  var statsText = must.length + ' Critical (Must)  |  ' + should.length + ' Improvements (Should)  |  ' + could.length + ' Strategic (Could)';
  s3.addText(statsText, { x: 1, y: 3.8, w: 11, fontSize: 14, align: 'center', color: GREY, fontFace: 'Calibri' });
  var answered = 0, total = 0;
  review.pillars.forEach(function(p) { p.questions.forEach(function(q) { total++; if (review.answers[q.id] && review.answers[q.id].score) answered++; }); });
  s3.addText(answered + ' of ' + total + ' questions assessed', { x: 1, y: 4.4, w: 11, fontSize: 12, align: 'center', color: GREY, fontFace: 'Calibri' });

  // SLIDE 4: Six-Pillar Scorecard

    { text: 'Pillar', options: { bold: true, color: WHITE, fill: { color: SQUID } } },

    { text: 'RAG', options: { bold: true, color: WHITE, fill: { color: SQUID } } },
    { text: 'Gaps', options: { bold: true, color: WHITE, fill: { color: SQUID } } }
  ]];
  review.pillars.forEach(function(p, i) {
    var ps = getPillarScore(review, i).pct;
    var gaps = 0;
    p.questions.forEach(function(q) { var a = review.answers[q.id]; if (a && (a.score === 'not' || a.score === 'partial')) gaps++; });
    pillarRows.push([
      { text: p.name },
      { text: ps + '%', options: { align: 'center' } },
      { text: ragLabel(ps), options: { color: ragColor(ps), bold: true, align: 'center' } },

  s4.addTable(pillarRows, { x: 0.5, y: 1.2, w: 12, fontSize: 13, fontFace: 'Calibri', border: { type: 'solid', pt: 0.5, color: 'E1E4E8' }, rowH: 0.5, colW: [4, 2, 2, 2], color: SQUID, autoPage: false });

  // SLIDE 5: Critical Findings Overview
  var s5 = addContentSlide('Critical Findings');

  });

  // SLIDE 6: Must/Should/Could Visual

  s6.addShape(pptx.shapes.ROUNDED_RECTANGLE, { x: 0.5, y: 1.55, w: 3.8, h: 5.0, fill: { color: 'FDF3F1' }, line: { color: RED, width: 1.5 }, rectRadius: 0.05 });
  s6.addText(must.slice(0, 6).map(function(m) { return '• ' + shortLabel(m); }).join('\n'), { x: 0.7, y: 1.75, w: 3.4, h: 4.6, fontSize: 11, color: SQUID, fontFace: 'Calibri', valign: 'top' });

  s6.addText('SHOULD (' + should.length + ' items)', { x: 4.7, y: 1.15, w: 3.8, fontSize: 16, bold: true, color: AMBER, align: 'center', fontFace: 'Calibri' });
  s6.addShape(pptx.shapes.ROUNDED_RECTANGLE, { x: 4.7, y: 1.55, w: 3.8, h: 5.0, fill: { color: 'FFF8E6' }, line: { color: AMBER, width: 1.5 }, rectRadius: 0.05 });
  s6.addText(should.slice(0, 6).map(function(m) { return '• ' + shortLabel(m); }).join('\n'), { x: 4.9, y: 1.75, w: 3.4, h: 4.6, fontSize: 11, color: SQUID, fontFace: 'Calibri', valign: 'top' });

  s6.addText('COULD (' + could.length + ' items)', { x: 8.9, y: 1.15, w: 3.8, fontSize: 16, bold: true, color: GREEN, align: 'center', fontFace: 'Calibri' });
  s6.addShape(pptx.shapes.ROUNDED_RECTANGLE, { x: 8.9, y: 1.55, w: 3.8, h: 5.0, fill: { color: 'F0FFF0' }, line: { color: GREEN, width: 1.5 }, rectRadius: 0.05 });

  // SLIDE 7: MUST - Quick Wins
  function buildTierSlide(title, items, tierColor, maxItems) {
    var slide = addContentSlide(title);
    var yPos = 1.2;
    items.slice(0, maxItems || 5).forEach(function(item) {
      slide.addText(item.id + ' — ' + truncate(item.question, 80), { x: 0.5, y: yPos, w: 12, fontSize: 13, bold: true, color: tierColor, fontFace: 'Calibri' });

  var filename = 'WAFR_Executive_Briefing_' + customer.replace(/[^a-zA-Z0-9]/g, '_') + '_' + today + '.pptx';

    alert('Error saving PowerPoint: ' + e.message);
  });
}

  pptx.write('base64').then(function(base64) {

    if (notifyEmail) sendDeckNotification(notifyEmail, review.customer, filename, true, '');
    alert('C-Level Deck saved. Access it from Saved Reports.');
  }).catch(function(e) {
    console.error('PPTX write error:', e);
    if (notifyEmail) sendDeckNotification(notifyEmail, review.customer, filename, false, e.message);
    alert('Error saving PowerPoint: ' + e.message);

}

// === AUTO WAFR ===
async function runAutoWafr(id) {
  var review = getReview(id);
  if (!review) return;

  // Check if account is connected
  var conn = review.awsConnection;
  if (!conn || !conn.roleArn) {
    alert('Please connect an AWS account first using the "Connect Account" button.');
    showConnectAccountModal(id);
    return;
  }

  showGeneratingOverlay();
  document.querySelector('.modal h3').textContent = 'Running Auto WAFR...';
  document.querySelector('.modal p').textContent = 'Scanning AWS account and generating AI-powered report. This may take 60-90 seconds.';

  // Gather all template questions
  var allQuestions = [];
  review.pillars.forEach(function(p) {
    p.questions.forEach(function(q) {
      allQuestions.push({ id: q.id, q: q.q, best: q.best });
    });
  });

  try {
    var res = await fetch(ENV.emailEndpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'autoWafr',
        roleArn: conn.roleArn,
        externalId: conn.externalId || '',
        region: conn.region || 'eu-west-2',
        reviewId: id,
        questions: allQuestions
      })
    });
    var data = await res.json();
    var payload = typeof data.body === 'string' ? JSON.parse(data.body) : data;

    if (payload.error) {
      hideGeneratingOverlay();
      alert('Auto WAFR failed: ' + payload.error);
      return;
    }

    // Generate the HTML report
    var html = generateAutoWafrHTML(review, payload.recommendations || {}, payload.summary || {});
    hideGeneratingOverlay();
    saveReportToCloud(review.id, 'autowafr', html, 'text/html', 'html', review.customer);
    openReportInNewTab(html);
  } catch(e) {
    hideGeneratingOverlay();
    alert('Auto WAFR error: ' + (e.message || e));
  }
}

  html += '.q-card{border:1px solid #e0e0e0;border-top:none;padding:20px;} .q-card:last-child{border-radius:0 0 6px 6px;}';
  html += '.q-id{font-weight:700;color:#0073bb;font-size:13px;display:flex;align-items:center;gap:8px;}';
  html += '.q-text{font-size:15px;margin:6px 0 14px;font-weight:500;}';
  html += '.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}';
  html += '.obs-box{background:#f5f5f5;border-left:4px solid #879596;padding:12px;margin-bottom:12px;border-radius:4px;font-size:14px;}';

  html += '.status-scanned{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:#1d8102;color:white;}';
  html += '.status-partial{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:#f2a20d;color:white;}';
  html += '.status-manual{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:#d13212;color:white;}';
  html += '.manual-box{background:#fff3f0;border-left:4px solid #d13212;padding:12px;margin-bottom:12px;border-radius:4px;font-size:14px;color:#6b1a0a;}';

function disconnectAccount(reviewId) {

  delete review.awsConnection;
  updateReview(review);
  closeModal();
  showReviewDashboard();

async function connectAndScan(reviewId, externalId) {
  var roleArn = document.getElementById('connect-role-arn').value.trim();
  var region = document.getElementById('connect-region').value;
  var statusEl = document.getElementById('connect-status');

  if (!roleArn) { statusEl.innerHTML = '<span style="color:#d13212;">Please enter the Role ARN.</span>'; return; }
  if (!roleArn.match(/^arn:aws:iam::\d{12}:role\/.+$/)) { statusEl.innerHTML = '<span style="color:#d13212;">Invalid ARN format. Expected: arn:aws:iam::123456789012:role/RoleName</span>'; return; }

  statusEl.innerHTML = '<span style="color:#0073bb;">Connecting and scanning... this may take 30-60 seconds.</span>';

  try {
    var res = await fetch(ENV.emailEndpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'scanAccount',
        roleArn: roleArn,
        externalId: externalId,
        region: region,
        reviewId: reviewId
      })
    });
    var data = await res.json();
    var payload = typeof data.body === 'string' ? JSON.parse(data.body) : data;

    if (payload.error) {
      statusEl.innerHTML = '<span style="color:#d13212;">Error: ' + payload.error + '</span>';
      return;
    }

    // Save connection details
    var review = getReview(reviewId);
    review.awsConnection = {
      roleArn: roleArn,
      externalId: externalId,
      region: region,
      lastScan: new Date().toISOString().split('T')[0] + ' ' + new Date().toTimeString().split(' ')[0],
      accountId: roleArn.split(':')[4]
    };

    // Auto-populate answers from scan data
    if (payload.findings) {
      var populated = 0;
      Object.keys(payload.findings).forEach(function(qId) {
        var finding = payload.findings[qId];
        if (!review.answers[qId]) review.answers[qId] = {};
        // Only populate if not already answered
        if (!review.answers[qId].notes || review.answers[qId].notes.trim() === '') {
          review.answers[qId].notes = finding.evidence || '';
          populated++;
        }
        if (!review.answers[qId].score && finding.score) {
          review.answers[qId].score = finding.score;
          populated++;
        }
      });
      statusEl.innerHTML = '<span style="color:#1d8102;">Scan complete. ' + populated + ' fields populated from ' + Object.keys(payload.findings).length + ' findings.</span>';
    } else {
      statusEl.innerHTML = '<span style="color:#1d8102;">Connected successfully. No findings to populate.</span>';
    }

    updateReview(review);
    setTimeout(function() { closeModal(); showReviewDashboard(); }, 2000);
  } catch(e) {
    statusEl.innerHTML = '<span style="color:#d13212;">Connection failed: ' + (e.message || e) + '</span>';
  }
}

function loadArchFiles(reviewId) {

  }).then(function(r) { return r.json(); }).then(function(d) {

      '<tr style="border-bottom:2px solid #e0e0e0;"><th style="text-align:left;padding:8px;">File</th><th style="text-align:left;padding:8px;">Uploaded</th><th style="text-align:left;padding:8px;">Status</th><th style="padding:8px;">Actions</th></tr>';
    files.forEach(function(f) {
      var statusBadge = f.extracted ? '<span style="color:#1d8102;">✓ Processed</span>' : '<span style="color:#ff9900;">⏳ Processing</span>';
      html += '<tr style="border-bottom:1px solid #eee;">' +
        '<td style="padding:8px;">' + f.filename + '</td>' +
        '<td style="padding:8px;">' + (f.timestamp || '').replace('T', ' ').substring(0, 16) + '</td>' +

        '<button class="btn btn-sm" style="color:#d13212;border-color:#d13212;" onclick="deleteArchFile(\'' + reviewId + '\',\'' + f.key + '\')">Delete</button>' +
        '</td></tr>';
    });
    html += '</table>';
    el.innerHTML = html;
  }).catch(function(e) {
    document.getElementById('arch-file-list').innerHTML = '<p style="color:#d13212;">Error loading files.</p>';
  });
}

function handleArchUpload(reviewId) {
  var input = document.getElementById('arch-file-input');
  var files = input.files;
  if (!files || files.length === 0) return;

  var validTypes = ['application/pdf', 'application/msword', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document', 'image/png', 'image/jpeg'];
  var validExts = ['.pdf', '.doc', '.docx', '.png', '.jpg', '.jpeg'];
  var statusEl = document.getElementById('arch-upload-status');
  var totalFiles = files.length;
  var uploaded = 0;
  var failed = 0;

  statusEl.innerHTML = '<span style="color:#ff9900;">Uploading ' + totalFiles + ' file(s)...</span>';

  for (var i = 0; i < files.length; i++) {
    (function(file) {
      var ext = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
      if (validTypes.indexOf(file.type) === -1 && validExts.indexOf(ext) === -1) {
        failed++;
        if (uploaded + failed === totalFiles) { finishUpload(); }
        return;
      }

      var reader = new FileReader();
      reader.onload = function(e) {
        var base64 = e.target.result.split(',')[1];
        fetch(ENV.emailEndpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'uploadArchInfo',
            reviewId: reviewId,
            filename: file.name,
            content: base64,
            contentType: file.type
          })
        }).then(function(r) { return r.json(); }).then(function(d) {
          var payload = typeof d.body === 'string' ? JSON.parse(d.body) : d;
          if (payload.error) { failed++; } else { uploaded++; }
          if (uploaded + failed === totalFiles) { finishUpload(); }
        }).catch(function(e) {
          failed++;
          if (uploaded + failed === totalFiles) { finishUpload(); }
        });
      };
      reader.readAsDataURL(file);
    })(files[i]);
  }

  function finishUpload() {
    input.value = '';
    if (failed > 0) {
      statusEl.innerHTML = '<span style="color:#ff9900;">✓ ' + uploaded + ' uploaded, ' + failed + ' failed (PDF/Word only)</span>';
    } else {
      statusEl.innerHTML = '<span style="color:#1d8102;">✓ ' + uploaded + ' file(s) uploaded — extracting text...</span>';
    }
    setTimeout(function() { loadArchFiles(reviewId); }, 3000);
  }
}

function downloadArchFile(key, filename) {
  fetch(ENV.emailEndpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'getReport', key: key })
  }).then(function(r) { return r.json(); }).then(function(d) {
    var payload = typeof d.body === 'string' ? JSON.parse(d.body) : d;
    if (payload.error) { alert('Error: ' + payload.error); return; }
    var bytes = Uint8Array.from(atob(payload.data), function(c) { return c.charCodeAt(0); });
    var blob = new Blob([bytes], { type: payload.contentType || 'application/octet-stream' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename || 'download';
    a.click();
  }).catch(function(e) { alert('Download error: ' + e.message); });
}

function deleteArchFile(reviewId, key) {
  if (!confirm('Delete this architecture document?')) return;
  fetch(ENV.emailEndpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'deleteArchInfo', reviewId: reviewId, key: key })
  }).then(function(r) { return r.json(); }).then(function(d) {
    var payload = typeof d.body === 'string' ? JSON.parse(d.body) : d;
    if (payload.deleted) { loadArchFiles(reviewId); }
    else { alert('Delete failed.'); }
  }).catch(function(e) { alert('Error: ' + e.message); });
}

function showSavedReports(id) {
  document.getElementById('modal-root').innerHTML = '<div class="modal-overlay" onclick="closeModal(event)">' +
    '<div class="modal" onclick="event.stopPropagation()" style="width:750px;max-width:90vw;"><h3>Saved Reports</h3>' +
    '<div id="saved-reports-list"><p style="color:#5f6b7a;">Loading...</p></div>' +
    '<div style="margin-top:16px;text-align:right;"><button class="btn" onclick="closeModal()">Close</button></div></div></div>';
  fetch(ENV.emailEndpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'listReports', reviewId: id })
  }).then(function(r) { return r.json(); }).then(function(d) {
    var payload = typeof d.body === 'string' ? JSON.parse(d.body) : d;
    var reports = payload.reports || [];
    var el = document.getElementById('saved-reports-list');
    if (reports.length === 0) { el.innerHTML = '<p style="color:#5f6b7a;">No saved reports yet. Generate a report and it will automatically save here.</p>'; return; }
    var typeOrder = { sowhat: 0, autowafr: 1, orr: 2, clevel: 3, standard: 4 };
    reports.sort(function(a, b) {
      var ta = typeOrder[a.reportType] !== undefined ? typeOrder[a.reportType] : 9;
      var tb = typeOrder[b.reportType] !== undefined ? typeOrder[b.reportType] : 9;
      if (ta !== tb) return ta - tb;
      return (b.timestamp || '').localeCompare(a.timestamp || '');
    });
    var html = '<table style="width:100%;border-collapse:collapse;font-size:13px;">' +
      '<tr style="border-bottom:2px solid #e0e0e0;"><th style="text-align:left;padding:8px;">Type</th><th style="text-align:left;padding:8px;">Date</th><th style="padding:8px;">Actions</th></tr>';
    reports.forEach(function(r) {
      var typeLabel = r.reportType === 'standard' ? 'WAFR Report' : r.reportType === 'sowhat' ? 'So What Report' : r.reportType === 'orr' ? 'ORR Report' : r.reportType === 'autowafr' ? 'Auto WAFR' : 'C-Level Deck';
      var ts = r.timestamp.replace('T', ' ').replace(/^(\d{4}-\d{2}-\d{2}) (\d{2})(\d{2})(\d{2})$/, '$1 $2:$3:$4');
      html += '<tr style="border-bottom:1px solid #eee;"><td style="padding:8px;">' + typeLabel + '</td><td style="padding:8px;">' + ts + '</td>' +
        '<td style="padding:8px;text-align:center;white-space:nowrap;">';
      if (r.extension === 'html') { html += '<button class="btn btn-sm" style="width:70px;" onclick="previewSavedReport(\'' + r.key + '\')">Preview</button> '; }
      else { html += '<button class="btn btn-sm" style="width:70px;visibility:hidden;">Preview</button> '; }
      html += '<button class="btn btn-sm btn-primary" style="width:80px;" onclick="downloadSavedReport(\'' + r.key + '\')">Download</button> ';
      html += '<button class="btn btn-sm" style="width:62px;color:#d13212;border-color:#d13212;" onclick="deleteSavedReport(this.dataset.key,\'' + id + '\')" data-key="' + r.key + '">Delete</button></td></tr>';
    });
    html += '</table>';
    el.innerHTML = html;
  }).catch(function(e) { document.getElementById('saved-reports-list').innerHTML = '<p style="color:#d13212;">Error loading reports.</p>'; });
}

function previewSavedReport(key) {
  fetch(ENV.emailEndpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'getReport', key: key })
  }).then(function(r) { return r.json(); }).then(function(d) {
    var payload = typeof d.body === 'string' ? JSON.parse(d.body) : d;
    var html = atob(payload.data);
    html = html.replace(/\u2014/g, '&mdash;').replace(/\u2013/g, '&ndash;').replace(/\u2018/g, '&lsquo;').replace(/\u2019/g, '&rsquo;').replace(/\u201C/g, '&ldquo;').replace(/\u201D/g, '&rdquo;').replace(/\u2026/g, '&hellip;');
    var w = window.open('', '_blank');
    w.document.write(html);
    w.document.close();
  }).catch(function(e) { alert('Error loading report preview.'); });
}

function downloadSavedReport(key) {
  fetch(ENV.emailEndpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'getReport', key: key })
  }).then(function(r) { return r.json(); }).then(function(d) {
    var payload = typeof d.body === 'string' ? JSON.parse(d.body) : d;
    if (payload.error) { alert('Lambda error: ' + payload.error); return; }
    var bytes = Uint8Array.from(atob(payload.data), function(c) { return c.charCodeAt(0); });
    var blob = new Blob([bytes], { type: payload.contentType });
    var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = payload.filename; a.click();
  }).catch(function(e) { alert('Download error: ' + e.message); });
}

function deleteSavedReport(key, reviewId) {
  if (!confirm('Delete this report?')) return;
  fetch(ENV.emailEndpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'deleteReport', key: key })
  }).then(function(r) { return r.json(); }).then(function(d) {
    var payload = typeof d.body === 'string' ? JSON.parse(d.body) : d;
    if (payload.deleted) { showSavedReports(reviewId); }
    else { alert('Delete failed: ' + JSON.stringify(payload)); }
  }).catch(function(e) { alert('Error deleting report: ' + e.message); });
}

// === CHAT WIDGET ===
var chatHistory = [];
var chatContext = '';
var chatContextLoaded = false;

function renderChatWidget() {
  // Only show on review dashboard/questions/improvement views
  if (!state.activeReview) { removeChatWidget(); return; }
  if (document.getElementById('chat-widget')) return;
  var widget = document.createElement('div');
  widget.id = 'chat-widget';
  widget.className = 'chat-widget collapsed';
  widget.innerHTML = '<div class="chat-header" onclick="toggleChat()">' +
    '<span>Ask about this review</span>' +
    '<button id="chat-toggle-btn">+</button></div>' +
    '<div class="chat-body" id="chat-body"></div>' +
    '<div class="chat-input-bar">' +
    '<input id="chat-input" type="text" placeholder="Ask a question about this review..." onkeydown="if(event.key===\'Enter\')sendChatMsg()">' +
    '<button id="chat-send-btn" onclick="sendChatMsg()">Send</button></div>';
  document.body.appendChild(widget);
}

function removeChatWidget() {
  var el = document.getElementById('chat-widget');
  if (el) el.remove();
  chatHistory = [];
  chatContext = '';
  chatContextLoaded = false;
}

function toggleChat() {
  var widget = document.getElementById('chat-widget');
  var btn = document.getElementById('chat-toggle-btn');
  if (widget.classList.contains('collapsed')) {
    widget.classList.remove('collapsed');
    widget.classList.add('expanded');
    btn.textContent = '\u2212';
    if (!chatContextLoaded) loadChatContext();
    setTimeout(function() { document.getElementById('chat-input').focus(); }, 100);
  } else {
    widget.classList.remove('expanded');
    widget.classList.add('collapsed');
    btn.textContent = '+';
  }
}

async function loadChatContext() {
  var review = getReview(state.activeReview);
  if (!review) return;
  chatContextLoaded = true;
  // Build context from review data (answers + notes)
  var contextParts = [];
  contextParts.push('Customer: ' + review.customer);
  contextParts.push('Date: ' + review.date);
  contextParts.push('Overall Score: ' + getOverallScore(review) + '%');
  review.pillars.forEach(function(p, i) {
    var s = getPillarScore(review, i);
    contextParts.push(p.name + ': ' + s.pct + '% (' + getRag(s.pct) + '), ' + s.answered + '/' + s.total + ' answered');
    p.questions.forEach(function(q) {
      var a = review.answers[q.id] || {};
      if (a.score) {
        contextParts.push(q.id + ' | ' + q.q + ' | Score: ' + a.score + (a.notes ? ' | Notes: ' + a.notes : ''));
      }
    });
  });
  chatContext = contextParts.join('\n');
  // Try to fetch saved reports for richer context
  try {
    var res = await fetch(ENV.emailEndpoint, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'listReports', reviewId: review.id })
    });
    var data = await res.json();
    var payload = typeof data.body === 'string' ? JSON.parse(data.body) : data;
    var reports = payload.reports || [];

    // Add report metadata to context (all types including C-Level)
    if (reports.length > 0) {
      var reportMeta = '\n\n=== SAVED REPORTS METADATA ===\n';
      reportMeta += 'Total reports generated: ' + reports.length + '\n';
      var typeCounts = {};
      reports.forEach(function(r) {
        var typeLabel = r.reportType === 'standard' ? 'WAFR Report' : r.reportType === 'sowhat' ? 'So What Report' : r.reportType === 'orr' ? 'ORR Report' : r.reportType === 'autowafr' ? 'Auto WAFR' : 'C-Level Deck';
        typeCounts[typeLabel] = (typeCounts[typeLabel] || 0) + 1;
        var ts = r.timestamp.replace('T', ' ').replace(/^(\d{4}-\d{2}-\d{2}) (\d{2})(\d{2})(\d{2})$/, '$1 $2:$3:$4');
        reportMeta += '- ' + typeLabel + ' | Generated: ' + ts + ' | Extension: ' + r.extension + ' | Size: ' + r.size + ' bytes\n';
      });
      reportMeta += '\nReport counts by type:\n';
      Object.keys(typeCounts).forEach(function(k) { reportMeta += '- ' + k + ': ' + typeCounts[k] + '\n'; });
      chatContext += reportMeta;
    } else {
      chatContext += '\n\n=== SAVED REPORTS ===\nNo reports have been generated yet for this review.\n';
    }

    // Get latest So What and Standard report content for deeper context
    var sowhat = reports.find(function(r) { return r.reportType === 'sowhat' && r.extension === 'html'; });
    var standard = reports.find(function(r) { return r.reportType === 'standard' && r.extension === 'html'; });
    if (sowhat) {
      var r1 = await fetch(ENV.emailEndpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'getReport', key: sowhat.key }) });
      var d1 = await r1.json(); var p1 = typeof d1.body === 'string' ? JSON.parse(d1.body) : d1;
      if (p1.data) chatContext += '\n\n=== SO WHAT REPORT CONTENT ===\n' + atob(p1.data).replace(/<[^>]+>/g, ' ').substring(0, 12000);
    }
    if (standard) {
      var r2 = await fetch(ENV.emailEndpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'getReport', key: standard.key }) });
      var d2 = await r2.json(); var p2 = typeof d2.body === 'string' ? JSON.parse(d2.body) : d2;
      if (p2.data) chatContext += '\n\n=== WAFR REPORT CONTENT ===\n' + atob(p2.data).replace(/<[^>]+>/g, ' ').substring(0, 12000);
    }
  } catch(e) { console.log('Chat context enrichment skipped:', e); }
}

async function sendChatMsg() {
  var input = document.getElementById('chat-input');
  var question = input.value.trim();
  if (!question) return;
  input.value = '';
  var body = document.getElementById('chat-body');
  var review = getReview(state.activeReview);
  // Show user message
  body.innerHTML += '<div class="chat-msg user"><div class="chat-bubble">' + escapeHtml(question) + '</div></div>';
  body.innerHTML += '<div class="chat-typing" id="chat-typing">Thinking...</div>';
  body.scrollTop = body.scrollHeight;
  document.getElementById('chat-send-btn').disabled = true;
  try {
    var res = await fetch(ENV.emailEndpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'chat',
        question: question,
        context: chatContext,
        history: chatHistory,
        customerName: review ? review.customer : 'Customer'
      })
    });
    var data = await res.json();
    var payload = typeof data.body === 'string' ? JSON.parse(data.body) : data;
    var typing = document.getElementById('chat-typing');
    if (typing) typing.remove();
    if (payload.answer) {
      chatHistory.push({ role: 'user', content: question });
      chatHistory.push({ role: 'assistant', content: payload.answer });
      var formatted = payload.answer.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      body.innerHTML += '<div class="chat-msg assistant"><div class="chat-bubble">' + formatted + '</div></div>';
    } else {
      body.innerHTML += '<div class="chat-msg assistant"><div class="chat-bubble" style="color:#d13212">Error: ' + (payload.error || 'No response') + '</div></div>';
    }
  } catch(e) {
    var typing = document.getElementById('chat-typing');
    if (typing) typing.remove();
    body.innerHTML += '<div class="chat-msg assistant"><div class="chat-bubble" style="color:#d13212">Network error. Please try again.</div></div>';
  }
  document.getElementById('chat-send-btn').disabled = false;
  body.scrollTop = body.scrollHeight;
}

function escapeHtml(text) {
  var div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
