<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkSpaces WAFR Tool</title>
<script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6/dist/amazon-cognito-identity.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@4.0.1/dist/pptxgen.bundle.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f3f5; color: #16191f; min-height: 100vh; }

/* Layout */
.app { display: flex; min-height: 100vh; }
.sidebar { width: 280px; background: #232f3e; color: #fff; position: fixed; height: 100vh; overflow-y: auto; z-index: 100; display: flex; flex-direction: column; }
.main { margin-left: 280px; flex: 1; min-height: 100vh; }

/* Sidebar */
.sidebar-header { padding: 20px 16px; border-bottom: 1px solid #3a4a5c; }
.sidebar-header h1 { font-size: 13px; font-weight: 600; color: #ff9900; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.sidebar-header h2 { font-size: 16px; font-weight: 600; color: #fff; }
.sidebar-header .sub { font-size: 11px; color: #aab7c4; margin-top: 4px; }
.sidebar-nav { flex: 1; padding: 8px 0; }
.nav-section { padding: 16px 16px 8px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #aab7c4; }
.nav-item { padding: 10px 16px; cursor: pointer; display: flex; align-items: center; gap: 8px; border-left: 3px solid transparent; transition: all 0.15s; font-size: 13px; }
.nav-item:hover { background: #3a4a5c; }
.nav-item.active { background: #3a4a5c; border-left-color: #ff9900; }
.nav-item .badge { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.badge-red { background: #d13212; }
.badge-amber { background: #ff9900; }
.badge-green { background: #1d8102; }
.badge-grey { background: #5f6b7a; }
.nav-item .pillar-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nav-item .progress-text { font-size: 11px; color: #aab7c4; width: 36px; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; }
.nav-item .expand-arrow { font-size: 10px; color: #5f6b7a; width: 12px; flex-shrink: 0; cursor: pointer; }
.pillar-questions { display: none; padding-left: 32px; }
.pillar-questions.open { display: block; }
.pillar-questions .q-item { padding: 6px 16px; font-size: 11px; color: #aab7c4; cursor: pointer; border-left: 2px solid transparent; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pillar-questions .q-item:hover { color: #fff; background: #3a4a5c; }
.pillar-questions .q-item.answered { color: #1d8102; }
.pillar-questions .q-item.active { border-left-color: #ff9900; color: #fff; }
.sidebar-footer { padding: 12px 16px; border-top: 1px solid #3a4a5c; }
.sidebar-footer button { width: 100%; padding: 8px; background: transparent; border: 1px solid #5f6b7a; color: #aab7c4; border-radius: 4px; cursor: pointer; font-size: 12px; }
.sidebar-footer button:hover { border-color: #ff9900; color: #ff9900; }

/* Topbar */
.topbar { background: #fff; padding: 14px 32px; border-bottom: 1px solid #e1e4e8; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.topbar h3 { font-size: 18px; font-weight: 600; }
.topbar-actions { display: flex; gap: 8px; }

/* Buttons */
.btn { padding: 8px 16px; border-radius: 4px; border: 1px solid #d5dbdb; background: #fff; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
.btn:hover { background: #fafafa; border-color: #aab7c4; }
.btn-primary { background: #ff9900; border-color: #ff9900; color: #fff; }
.btn-primary:hover { background: #ec7211; border-color: #ec7211; }
.btn-danger { color: #d13212; border-color: #d13212; }
.btn-danger:hover { background: #fdf3f1; }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* Content */
.content { padding: 32px; max-width: 1100px; }

/* Home view */
.home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 20px; }
.home-section h3 { font-size: 16px; margin-bottom: 12px; color: #232f3e; }
.review-card, .template-card { background: #fff; border: 1px solid #e1e4e8; border-radius: 8px; padding: 16px; margin-bottom: 12px; cursor: pointer; transition: all 0.15s; }
.review-card:hover, .template-card:hover { border-color: #ff9900; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.review-card h4, .template-card h4 { font-size: 14px; margin-bottom: 4px; }
.review-card .meta, .template-card .meta { font-size: 12px; color: #5f6b7a; }
.review-card .progress-bar { height: 4px; background: #e1e4e8; border-radius: 2px; margin-top: 8px; }
.review-card .progress-fill { height: 100%; background: #ff9900; border-radius: 2px; transition: width 0.3s; }
.pillar-toggle { font-size: 12px; color: #0073bb; cursor: pointer; margin-top: 8px; user-select: none; transition: all 0.15s; }
.pillar-toggle:hover { text-decoration: underline; }
.pillar-toggle.open { color: #16191f; }
.pillar-details { display: none; margin-top: 8px; padding: 8px 0; border-top: 1px solid #e1e4e8; }
.pillar-details.open { display: block; }
.pillar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
.pillar-name { flex: 1; color: #16191f; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pillar-score { width: 40px; text-align: right; color: #5f6b7a; font-variant-numeric: tabular-nums; }
.pillar-bar { width: 60px; height: 4px; background: #e1e4e8; border-radius: 2px; flex-shrink: 0; }
.pillar-bar-fill { height: 100%; border-radius: 2px; }
.card-actions { display: flex; gap: 6px; margin-top: 8px; }

/* Dashboard */
.dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin: 20px 0; }
.pillar-card { background: #fff; border-radius: 8px; padding: 20px; border: 1px solid #e1e4e8; cursor: pointer; transition: all 0.15s; }
.pillar-card:hover { border-color: #ff9900; }
.pillar-card h4 { font-size: 14px; margin-bottom: 8px; }
.pillar-card .score { font-size: 28px; font-weight: 700; }
.pillar-card .score-bar { height: 6px; background: #e1e4e8; border-radius: 3px; margin-top: 8px; }
.pillar-card .score-fill { height: 100%; border-radius: 3px; }
.rag-badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 600; color: #fff; }
.rag-red { background: #d13212; }
.rag-amber { background: #ff9900; }
.rag-green { background: #1d8102; }
.overall-score { text-align: center; padding: 24px; background: #fff; border-radius: 8px; border: 1px solid #e1e4e8; margin-bottom: 20px; }
.overall-score .big { font-size: 48px; font-weight: 700; color: #232f3e; }
.overall-score .label { font-size: 14px; color: #5f6b7a; margin-top: 4px; }

/* Question view */
.question-layout { display: flex; gap: 20px; align-items: flex-start; }
.question-container { background: #fff; border-radius: 8px; border: 1px solid #e1e4e8; padding: 24px; margin: 20px 0; flex: 1; min-width: 0; }
.explain-panel { width: 380px; flex-shrink: 0; background: #fff; border: 1px solid #e1e4e8; border-radius: 8px; margin: 20px 0; overflow: hidden; transition: width 0.2s; }
.explain-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #232f3e; color: #fff; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.explain-toggle { background: none; border: 1px solid rgba(255,255,255,0.3); color: #fff; width: 24px; height: 24px; border-radius: 4px; cursor: pointer; font-size: 16px; line-height: 1; }
.explain-toggle:hover { border-color: #ff9900; color: #ff9900; }
.explain-content { padding: 16px; max-height: 70vh; overflow-y: auto; }
.explain-text { font-size: 13px; line-height: 1.6; color: #16191f; }
.explain-text strong { color: #232f3e; }
.explain-loading { font-size: 13px; color: #5f6b7a; font-style: italic; }
.explain-error { font-size: 13px; color: #d13212; }
.question-id { font-size: 12px; color: #ff9900; font-weight: 600; margin-bottom: 8px; }
.question-text { font-size: 16px; font-weight: 600; margin-bottom: 16px; line-height: 1.4; }
.best-practice { background: #f8f9fa; border-left: 3px solid #1d8102; padding: 12px 16px; margin-bottom: 20px; border-radius: 0 4px 4px 0; }
.best-practice .bp-label { font-size: 11px; font-weight: 600; color: #1d8102; text-transform: uppercase; margin-bottom: 4px; }
.best-practice p { font-size: 13px; color: #545b64; line-height: 1.5; }
.answer-group { margin-bottom: 20px; }
.answer-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
.answer-options { display: flex; gap: 8px; flex-wrap: wrap; }
.answer-opt { padding: 8px 14px; border: 2px solid #e1e4e8; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
.answer-opt:hover { border-color: #ff9900; }
.answer-opt.selected { border-color: #ff9900; background: #fff8f0; font-weight: 600; }
.answer-opt.sel-red { border-color: #d13212; background: #fdf3f1; }
.answer-opt.sel-amber { border-color: #ff9900; background: #fff8f0; }
.answer-opt.sel-green { border-color: #1d8102; background: #f2f8f0; }
.answer-opt.sel-na { border-color: #5f6b7a; background: #f5f6f7; }
.notes-group { margin-top: 16px; }
.notes-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
.notes-group textarea { width: 100%; min-height: 80px; padding: 10px; border: 1px solid #e1e4e8; border-radius: 4px; font-size: 13px; font-family: inherit; resize: vertical; }
.notes-group textarea:focus { outline: none; border-color: #ff9900; }
.question-nav { display: flex; justify-content: space-between; margin-top: 20px; }

/* Improvement plan */
.improvement-item { background: #fff; border: 1px solid #e1e4e8; border-radius: 6px; padding: 16px; margin-bottom: 12px; }
.improvement-item .imp-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.improvement-item .imp-id { font-size: 12px; color: #ff9900; font-weight: 600; }
.improvement-item .imp-q { font-size: 14px; font-weight: 500; }
.improvement-item .imp-action { font-size: 13px; color: #545b64; margin-top: 8px; padding: 8px; background: #f8f9fa; border-radius: 4px; }

/* Modal */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; }
.modal { background: #fff; border-radius: 8px; padding: 24px; width: 500px; max-width: 90vw; max-height: 80vh; overflow-y: auto; }
.modal h3 { margin-bottom: 16px; }
.modal .form-group { margin-bottom: 14px; }
.modal .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.modal .form-group input, .modal .form-group select { width: 100%; padding: 8px; border: 1px solid #e1e4e8; border-radius: 4px; font-size: 13px; }
.modal .form-group input:focus, .modal .form-group select:focus { outline: none; border-color: #ff9900; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* Radar chart container */
.radar-container { display: flex; justify-content: center; margin: 20px 0; }

/* Log panel */
.log-panel { position: fixed; bottom: 0; left: 280px; right: 0; height: 220px; background: #16191f; border-top: 2px solid #ff9900; z-index: 150; display: none; flex-direction: column; }
.log-panel.open { display: flex; }
.log-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 16px; background: #232f3e; flex-shrink: 0; }
.log-header span { font-size: 12px; font-weight: 600; color: #ff9900; text-transform: uppercase; letter-spacing: 0.5px; }
.log-header button { background: none; border: 1px solid #5f6b7a; color: #aab7c4; padding: 2px 8px; border-radius: 3px; font-size: 11px; cursor: pointer; }
.log-header button:hover { border-color: #ff9900; color: #ff9900; }
.log-entries { flex: 1; overflow-y: auto; padding: 8px 16px; font-family: monospace; font-size: 11px; }
.log-entry { padding: 2px 0; border-bottom: 1px solid #232f3e; line-height: 1.5; }
.log-entry .log-time { color: #5f6b7a; margin-right: 8px; }
.log-entry.info .log-msg { color: #aab7c4; }
.log-entry.success .log-msg { color: #1d8102; }
.log-entry.warn .log-msg { color: #ff9900; }
/* Chat widget */
.chat-widget { position: fixed; bottom: 0; right: 20px; width: 400px; z-index: 160; display: flex; flex-direction: column; transition: height 0.2s; }
.chat-widget.collapsed { height: 42px; }
.chat-widget.expanded { height: 420px; }
.chat-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: #232f3e; border-radius: 8px 8px 0 0; cursor: pointer; flex-shrink: 0; }
.chat-header span { font-size: 13px; font-weight: 600; color: #ff9900; }
.chat-header button { background: none; border: none; color: #aab7c4; font-size: 16px; cursor: pointer; }
.chat-header button:hover { color: #ff9900; }
.chat-body { flex: 1; background: #fff; border-left: 1px solid #e1e4e8; border-right: 1px solid #e1e4e8; overflow-y: auto; padding: 12px; display: none; }
.chat-widget.expanded .chat-body { display: block; }
.chat-input-bar { display: none; padding: 8px 12px; background: #fff; border: 1px solid #e1e4e8; border-top: none; border-radius: 0 0 8px 8px; }
.chat-widget.expanded .chat-input-bar { display: flex; gap: 8px; }
.chat-input-bar input { flex: 1; padding: 8px 12px; border: 1px solid #d5dbdb; border-radius: 4px; font-size: 13px; }
.chat-input-bar input:focus { outline: none; border-color: #ff9900; }
.chat-input-bar button { padding: 8px 14px; background: #ff9900; border: none; color: #fff; border-radius: 4px; font-size: 13px; font-weight: 500; cursor: pointer; }
.chat-input-bar button:hover { background: #ec7211; }
.chat-input-bar button:disabled { background: #d5dbdb; cursor: not-allowed; }
.chat-msg { margin-bottom: 10px; }
.chat-msg.user { text-align: right; }
.chat-msg.user .chat-bubble { background: #ff9900; color: #fff; display: inline-block; padding: 8px 12px; border-radius: 12px 12px 2px 12px; font-size: 13px; max-width: 85%; text-align: left; }
.chat-msg.assistant .chat-bubble { background: #f1f3f5; color: #16191f; display: inline-block; padding: 8px 12px; border-radius: 12px 12px 12px 2px; font-size: 13px; max-width: 85%; text-align: left; line-height: 1.5; }
.chat-msg.assistant .chat-bubble strong { color: #232f3e; }
.chat-typing { font-size: 12px; color: #5f6b7a; font-style: italic; padding: 4px 0; }

.log-entry.error .log-msg { color: #d13212; }
@media print {
  .sidebar, .topbar, .btn, .question-nav, .chat-widget { display: none !important; }
  .main { margin-left: 0 !important; }
  .content { padding: 10px !important; }
}

/* Auth Screen */
.auth-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #232f3e; }
.auth-box { background: #fff; border-radius: 8px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
.auth-box h1 { font-size: 20px; color: #232f3e; margin-bottom: 4px; }
.auth-box h2 { font-size: 13px; color: #ff9900; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 24px; }
.auth-box .logo { font-size: 14px; color: #ff9900; font-weight: 600; margin-bottom: 20px; }
.auth-field { margin-bottom: 16px; }
.auth-field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: #232f3e; }
.auth-field input { width: 100%; padding: 10px 12px; border: 1px solid #d5dbdb; border-radius: 4px; font-size: 14px; }
.auth-field input:focus { outline: none; border-color: #ff9900; }
.auth-error { color: #d13212; font-size: 12px; margin-bottom: 12px; display: none; }
.auth-btn { width: 100%; padding: 12px; background: #ff9900; border: none; border-radius: 4px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
.auth-btn:hover { background: #ec7211; }
.auth-btn-secondary { background: transparent; border: 1px solid #d5dbdb; color: #232f3e; }
.auth-btn-secondary:hover { border-color: #ff9900; color: #ff9900; background: transparent; }
.auth-link { text-align: center; margin-top: 16px; font-size: 13px; color: #5f6b7a; }
.auth-link a { color: #ff9900; cursor: pointer; text-decoration: none; }
.auth-link a:hover { text-decoration: underline; }
.user-bar { padding: 12px 16px; border-top: 1px solid #3a4a5c; display: flex; align-items: center; gap: 8px; }
.user-bar .user-icon { width: 28px; height: 28px; border-radius: 50%; background: #ff9900; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; }
.user-bar .user-name { font-size: 12px; color: #fff; flex: 1; }
.user-bar .logout-btn { font-size: 11px; color: #aab7c4; cursor: pointer; border: none; background: none; }
.user-bar .logout-btn:hover { color: #ff9900; }
.sync-indicator { font-size: 10px; color: #1d8102; padding: 2px 6px; border-radius: 3px; background: rgba(29,129,2,0.1); }

</style>
</head>
<body>

<!-- Auth Screen -->
<div id="auth-screen" class="auth-container" style="display:none;">
  <div class="auth-box">
    <div class="logo">AWS WELL-ARCHITECTED</div>
    <h1>WorkSpaces WAFR Tool</h1>
    <h2>Sign In</h2>
    <div id="auth-error" class="auth-error"></div>
    <div id="login-form">
      <div class="auth-field"><label>Email</label><input type="email" id="auth-email" placeholder="you@example.com"></div>
      <div class="auth-field"><label>Password</label><input type="password" id="auth-password" placeholder="Password"></div>
      <button class="auth-btn" onclick="handleLogin()">Sign In</button>
      <div class="auth-link">Don't have an account? <a onclick="showSignup()">Sign up</a></div>
    </div>
    <div id="signup-form" style="display:none;">
      <div class="auth-field"><label>Email</label><input type="email" id="signup-email" placeholder="you@example.com"></div>
      <div class="auth-field"><label>Password</label><input type="password" id="signup-password" placeholder="Minimum 8 characters"></div>
      <div class="auth-field"><label>Display Name</label><input type="text" id="signup-name" placeholder="Your name"></div>
      <button class="auth-btn" onclick="handleSignup()">Create Account</button>
      <div class="auth-link">Already have an account? <a onclick="showLogin()">Sign in</a></div>
    </div>
    <div id="confirm-form" style="display:none;">
      <p style="font-size:13px;margin-bottom:16px;color:#545b64;">Check your email for a verification code.</p>
      <div class="auth-field"><label>Verification Code</label><input type="text" id="confirm-code" placeholder="Enter code"></div>
      <button class="auth-btn" onclick="handleConfirm()">Verify</button>
    </div>
    <div style="margin-top:24px;padding-top:16px;border-top:1px solid #e1e4e8;">
      <button class="auth-btn auth-btn-secondary" onclick="offlineMode()">Continue Offline (localStorage only)</button>
    </div>
  </div>
</div>

<div id="app-root" class="app" style="display:none;">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="topbar" id="topbar"></div>
    <div class="content" id="content"></div>
  </div>
</div>
<div id="modal-root"></div>
<div id="log-panel" class="log-panel">
  <div class="log-header">
    <span>Sync Log</span>
    <div style="display:flex;gap:6px">
      <button onclick="clearLog()">Clear</button>
      <button onclick="toggleLog()">Close</button>
    </div>
  </div>
  <div class="log-entries" id="log-entries"></div>
</div>

<script>

// === LOGGING ===
var logEntries = [];
function appLog(msg, level) {
  level = level || 'info';
  var entry = { time: new Date().toLocaleTimeString(), msg: msg, level: level };
  logEntries.unshift(entry);
  if (logEntries.length > 100) logEntries.pop();
  var el = document.getElementById('log-entries');
  if (el) {
    var div = document.createElement('div');
    div.className = 'log-entry ' + level;
    div.innerHTML = '<span class="log-time">' + entry.time + '</span><span class="log-msg">' + msg + '</span>';
    el.insertBefore(div, el.firstChild);
    if (el.children.length > 100) el.removeChild(el.lastChild);
  }
}
function toggleLog() {
  var p = document.getElementById('log-panel');
  p.classList.toggle('open');
}
function clearLog() {
  logEntries = [];
  var el = document.getElementById('log-entries');
  if (el) el.innerHTML = '';
}

// === ENVIRONMENT DETECTION ===
// Auto-detect dev vs production based on Amplify hostname
// Dev: dev.d1p2543h8l2mfc.amplifyapp.com or localhost
// Prod: main.d1p2543h8l2mfc.amplifyapp.com or anything else
var ENV = (function() {
  var host = window.location.hostname;
  var isDev = host.indexOf('dev.') === 0 || host.indexOf('localhost') !== -1 || host.indexOf('127.0.0.1') !== -1;
  if (isDev) {
    return {
      name: 'development',
      cognitoUserPoolId: 'eu-west-2_Wy0eJHyN3',
      cognitoClientId: '1kj98mt2cjbci4sa9okfg4o5dk',
      appsyncEndpoint: 'https://onspvolhtvgzronj367lyx5wy4.appsync-api.eu-west-2.amazonaws.com/graphql',
      emailEndpoint: 'https://6m3zxv0zxa.execute-api.eu-west-2.amazonaws.com/email-report',
      explainEndpoint: 'https://6m3zxv0zxa.execute-api.eu-west-2.amazonaws.com/explain'
    };
  }
  return {
    name: 'production',

try {

      UserPoolId: COGNITO_USER_POOL_ID,

    });

// GraphQL helper
async function gql(query, variables) {
  if (!idToken) return null;
  var res = await fetch(APPSYNC_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': idToken },
    body: JSON.stringify({ query: query, variables: variables || {} })
  });
  var json = await res.json();
  if (json.errors) { throw { message: json.errors[0] && json.errors[0].message || 'GraphQL error', errors: json.errors }; }
  return json.data;
}

// === AUTH FUNCTIONS ===
function checkAuth() {
  if (!amplifyReady || !cognitoUserPool) { showAuthScreen(); return; }
  var cognitoUser = cognitoUserPool.getCurrentUser();
  if (!cognitoUser) { showAuthScreen(); return; }
  cognitoUser.getSession(function(err, session) {
    if (err || !session || !session.isValid()) { showAuthScreen(); return; }
    idToken = session.getIdToken().getJwtToken();
    var payload = session.getIdToken().payload;
    if (!checkEnvironmentAccess(payload)) { showAccessDenied(); return; }
    currentUser = { username: payload.name || payload.email.split('@')[0], email: payload.email };
    showApp();
  });
}

function showAuthScreen() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app-root').style.display = 'none';
}

function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-root').style.display = 'flex';
  initApp();
}

// === ENVIRONMENT ACCESS CONTROL ===
// Check if user's Cognito groups allow access to current environment
function checkEnvironmentAccess(payload) {
  var groups = payload['cognito:groups'] || [];
  var envName = ENV.name; // 'development' or 'production'
  // If no groups configured yet (migration period), allow access
  if (groups.length === 0) return true;
  // Admins can access everything
  if (groups.indexOf('Admins') !== -1) return true;
  // Dev group can access development
  if (envName === 'development' && groups.indexOf('Dev') !== -1) return true;
  // Prod group can access production
  if (envName === 'production' && groups.indexOf('Prod') !== -1) return true;
  return false;
}

function showAccessDenied() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app-root').style.display = 'none';
  var box = document.querySelector('.auth-box');
  if (box) {
    box.innerHTML = '<h2 style="color:#d13212;">Access Denied</h2>' +
      '<p style="margin:16px 0;color:#16191f;">Your account does not have permission to access the <strong>' + ENV.name + '</strong> environment.</p>' +
      '<p style="color:#5f6b7a;">Contact your administrator to be added to the appropriate group.</p>' +
      '<button class="btn" onclick="handleLogout()" style="margin-top:20px;">Sign Out</button>';
  }
}

function offlineMode() {
  currentUser = { username: 'Offline User', email: 'offline@local' };

}

var pendingEmail = '';
function handleLogin() {
  var email = document.getElementById('auth-email').value;
  var pw = document.getElementById('auth-password').value;
  var errEl = document.getElementById('auth-error');
  errEl.style.display = 'none';
  if (!amplifyReady || !cognitoUserPool) { offlineMode(); return; }
  var authDetails = new AmazonCognitoIdentity.AuthenticationDetails({ Username: email, Password: pw });
  var cognitoUser = new AmazonCognitoIdentity.CognitoUser({ Username: email, Pool: cognitoUserPool });
  cognitoUser.authenticateUser(authDetails, {
    onSuccess: function(session) {
      idToken = session.getIdToken().getJwtToken();
      var payload = session.getIdToken().payload;
      if (!checkEnvironmentAccess(payload)) { showAccessDenied(); return; }
      currentUser = { username: payload.name || payload.email.split('@')[0], email: payload.email };
      showApp();
    },
    onFailure: function(err) {
      errEl.textContent = err.message || 'Login failed';
      errEl.style.display = 'block';
    },
    newPasswordRequired: function(userAttributes) {
      cognitoUser.completeNewPasswordChallenge(pw, {}, this);
    }
  });
}

function handleSignup() {
  var email = document.getElementById('signup-email').value;
  var pw = document.getElementById('signup-password').value;
  var name = document.getElementById('signup-name').value;
  var errEl = document.getElementById('auth-error');
  errEl.style.display = 'none';
  if (!amplifyReady || !cognitoUserPool) { offlineMode(); return; }
  var attrs = [new AmazonCognitoIdentity.CognitoUserAttribute({ Name: 'name', Value: name })];
  cognitoUserPool.signUp(email, pw, attrs, null, function(err, result) {
    if (err) { errEl.textContent = err.message || 'Signup failed'; errEl.style.display = 'block'; return; }
    pendingEmail = email;
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('signup-form').style.display = 'none';
    document.getElementById('confirm-form').style.display = 'block';
    document.querySelector('.auth-box h2').textContent = 'Verify Email';
  });
}

function handleConfirm() {
  var code = document.getElementById('confirm-code').value;
  var errEl = document.getElementById('auth-error');
  errEl.style.display = 'none';
  var cognitoUser = new AmazonCognitoIdentity.CognitoUser({ Username: pendingEmail, Pool: cognitoUserPool });
  cognitoUser.confirmRegistration(code, true, function(err) {
    if (err) { errEl.textContent = err.message || 'Verification failed'; errEl.style.display = 'block'; return; }
    showLogin();
  });
}

function handleLogout() {
  if (cognitoUserPool) {
    var user = cognitoUserPool.getCurrentUser();
    if (user) user.signOut();
  }
  currentUser = null;
  idToken = null;
  showAuthScreen();
}

  if (idToken) { loadFromCloud(); }
  showHome();
}

// Cloud sync (non-blocking) — upsert: try create, on conflict do update
async function syncReviewToCloud(review) {
  if (!idToken) return;
  var input = {
    id: review.id, templateId: review.templateId || '', templateName: review.template || review.templateName || '',
    customerName: review.customer || review.customerName || '', reviewerName: review.reviewer || review.reviewerName || '',
    reviewDate: review.date || review.reviewDate || '', answers: JSON.stringify(review.answers || {}),
    notes: JSON.stringify(review.notes || {}), status: review.status || 'in-progress'
  };
  try {
    await gql(`mutation M($input: CreateReviewInput!) { createReview(input: $input) { id } }`, { input: input });
    appLog('Saved to DynamoDB (create): ' + input.id, 'success');
  } catch(e) {
    if (e.message && (e.message.includes('ConditionalCheckFailed') || e.message.includes('already exists'))) {
      try {
        await gql(`mutation M($input: UpdateReviewInput!) { updateReview(input: $input) { id } }`, { input: input });
        appLog('Saved to DynamoDB (update): ' + input.id, 'success');
      } catch(e2) { appLog('DynamoDB update failed: ' + e2.message, 'error'); }
    } else { appLog('DynamoDB sync error: ' + e.message, 'error'); }
  }
}

async function loadFromCloud() {
  if (!idToken) return;
  appLog('Loading reviews from DynamoDB...', 'info');
  try {
    var data = await gql(`query Q { listReviews { id templateId templateName customerName reviewerName reviewDate answers notes status } }`);
    if (!data) return;
    var items = data.listReviews;
    if (items && items.length > 0) {
      var templates = getTemplates();
      var localReviews = getReviews();
      var cloudReviews = items.map(function(r) {
        var cloudAnswers = typeof r.answers === 'string' ? JSON.parse(r.answers || '{}') : (r.answers || {});
        var notes = typeof r.notes === 'string' ? JSON.parse(r.notes || '{}') : (r.notes || {});
        var tmpl = templates.find(function(t) { return t.id === r.templateId; });
        // Merge: local answers take priority over cloud (prevents race condition overwrite)
        var localReview = localReviews.find(function(lr) { return lr.id === r.id; });
        var mergedAnswers = cloudAnswers;
        if (localReview && localReview.answers) {
          mergedAnswers = Object.assign({}, cloudAnswers, localReview.answers);
        }
        return { id: r.id, templateId: r.templateId, template: r.templateName,
          customer: r.customerName, reviewer: r.reviewerName,
          date: r.reviewDate, answers: mergedAnswers, notes: notes,
          status: r.status, pillars: tmpl ? JSON.parse(JSON.stringify(tmpl.pillars)) : [] };
      });
      // Cloud is source of truth — replace local cache entirely
      localStorage.setItem('wafr-reviews', JSON.stringify(cloudReviews));
      appLog('Loaded ' + cloudReviews.length + ' reviews from DynamoDB (cloud is source of truth)', 'success');
    }
  } catch(e) { appLog('Load from DynamoDB failed: ' + (e.message || e), 'error'); }
}
